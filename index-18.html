// STORAGE (localStorage fallback — works offline on Android WebView)
// ─────────────────────────────────────────────────────────────────────────────
window.storage = {
  get: async (key) => {
    try {
      // Try Android bridge first
      if (window.AndroidStorage) {
        const v = window.AndroidStorage.get(key);
        return v ? { key, value: v } : null;
      }
    } catch(e) {}
    const v = localStorage.getItem(key);
    return v ? { key, value: v } : null;
  },
  set: async (key, value) => {
    try {
      if (window.AndroidStorage) { window.AndroidStorage.set(key, value); return { key, value }; }
    } catch(e) {}
    localStorage.setItem(key, value);
    return { key, value };
  },
  delete: async (key) => {
    try { if (window.AndroidStorage) window.AndroidStorage.remove(key); } catch(e) {}
    localStorage.removeItem(key);
    return { key, deleted: true };
  },
  list: async (prefix) => {
    const keys = Object.keys(localStorage).filter(k => !prefix || k.startsWith(prefix));
    return { keys };
  }
};

  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
};

  const imgSrc=card.image||sprite;
  return(
    <div onClick={onClick} style={{width:d.w,height:d.h,borderRadius:10,overflow:"hidden",cursor:"pointer",flexShrink:0,display:"flex",flexDirection:"column",border:selected?`2px solid #FFD700`:`1.5px solid ${tc}99`,boxShadow:selected?`0 0 18px rgba(255,215,0,0.7),0 4px 16px rgba(0,0,0,0.6)`:"0 4px 14px rgba(0,0,0,0.5)",opacity:dimmed?0.4:1,background:imgSrc&&card.image?"#fff":`linear-gradient(160deg,${tc}22,${tc}66)`,transition:"transform 0.12s,box-shadow 0.12s"}}>
      <div style={{background:`${tc}ee`,padding:"2px 5px",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>

        {card.hp&&<span style={{color:"#FFD700",fontSize:d.hp,fontWeight:900,flexShrink:0,marginLeft:2,textShadow:"0 1px 3px rgba(0,0,0,0.9)"}}>HP{card.hp}</span>}
      </div>
      <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden",background:imgSrc&&card.image?"#f5f5f5":`radial-gradient(ellipse,${tc}33,transparent 70%)`}}>
        {imgSrc?(
          <img src={imgSrc} alt={card.name} style={{width:card.image?"100%":"80%",height:card.image?"100%":"80%",objectFit:card.image?"cover":"contain",imageRendering:sprite?"pixelated":"auto"}} onError={e=>e.target.style.display="none"}/>

          <div style={{textAlign:"center"}}>
            <div style={{fontSize:d.n*2.2}}>{TYPE_EMOJI[card.types?.[0]]||"✨"}</div>
            {size!=="xs"&&<div style={{color:"#fff",fontSize:d.a,fontWeight:700}}>{card.types?.[0]}</div>}
          </div>
        ):<div style={{color:"rgba(255,255,255,0.2)",fontSize:d.n*2}}>?</div>}
      </div>
      {size!=="xs"&&card.supertype==="Pokémon"&&card.attacks?.length>0&&(
        <div style={{background:"rgba(0,0,0,0.7)",padding:"2px 5px",flexShrink:0}}>

            </div>
          ))}
        </div>
      )}
      {card.supertype==="Pokémon"&&<div style={{height:3,background:tc,flexShrink:0}}/>}
    </div>
  );
}

          {onPlayBench&&<button onClick={onPlayBench} disabled={!canBench} style={{flex:1,padding:"11px",borderRadius:12,background:canBench?"linear-gradient(135deg,#16A34A,#15803D)":"rgba(255,255,255,0.05)",color:canBench?"#fff":"rgba(255,255,255,0.2)",fontWeight:800,fontSize:12,border:"none",cursor:canBench?"pointer":"not-allowed"}}>🃏 To Bench</button>}
          {onAttachEnergy&&<button onClick={onAttachEnergy} disabled={!canAttachEnergy} style={{flex:1,padding:"11px",borderRadius:12,background:canAttachEnergy?"linear-gradient(135deg,#F59E0B,#D97706)":"rgba(255,255,255,0.05)",color:canAttachEnergy?"#000":"rgba(255,255,255,0.2)",fontWeight:800,fontSize:12,border:"none",cursor:canAttachEnergy?"pointer":"not-allowed"}}>⚡ Attach</button>}
          <button onClick={onClose} style={{flex:1,padding:"11px",borderRadius:12,background:"rgba(255,255,255,0.07)",color:"rgba(255,255,255,0.6)",fontWeight:700,fontSize:12,border:"1px solid rgba(255,255,255,0.1)",cursor:"pointer"}}>Close</button>
        </div>
      </div>
    </div>
  );
}

function HpBar({pokemon}){
  if(!pokemon) return null;
  const maxHp=pokemon.hp||60,curHp=Math.max(0,maxHp-(pokemon.damage||0)),pct=(curHp/maxHp)*100;
  const col=pct>50?"#4ADE80":pct>25?"#FBBF24":"#F87171";
  return(
    <div style={{width:"100%"}}>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:10,marginBottom:2}}>
        <span style={{color:"rgba(255,255,255,0.75)",fontWeight:700,maxWidth:64,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{pokemon.name}</span>
        <span style={{color:col,fontWeight:900}}>{curHp}/{maxHp}</span>
      </div>
      <div style={{height:6,background:"rgba(255,255,255,0.12)",borderRadius:99,overflow:"hidden"}}>
        <div style={{height:"100%",width:`${pct}%`,background:col,borderRadius:99,transition:"width 0.4s ease",boxShadow:`0 0 6px ${col}88`}}/>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// BATTLE ENGINE
// ─────────────────────────────────────────────────────────────────────────────
const bCard = c => ({...c,uid:uid(),damage:0,energyAttached:0});
const canAttack = (poke,i=0) => {
  const atk=poke?.attacks?.[i];
  if(!atk) return false;
  return (poke.energyAttached||0) >= (atk.cost?.length||1);
};
function buildDeck(pool){
  const pokes=shuffle(pool).slice(0,8).map(bCard);
  const mainType=pokes[0]?.types?.[0]||"Colorless";
  return shuffle([...pokes,...Array.from({length:12},()=>makeEnergy(mainType))]);
}
function setupSide(deck){
  const d=[...deck];
  const pi=d.findIndex(c=>c.supertype==="Pokémon");
  if(pi<0) return null;
  const active=bCard(d.splice(pi,1)[0]);
  const prizes=d.splice(0,PRIZE_COUNT);
  const hand=d.splice(0,HAND_SIZE);
  return{active,bench:[],hand,deck:d,prizes,discard:[]};
}
function doAttack(state,atkKey,defKey,atkIdx){
  let s=JSON.parse(JSON.stringify(state));
  const att=s[atkKey].active,def=s[defKey].active;
  if(!att||!def) return s;
  const atk=att.attacks[atkIdx]; if(!atk) return s;
  const dmg=atk.damage||20;
  def.damage=(def.damage||0)+dmg;
  const log=[`💥 ${att.name} used ${atk.name}! ${dmg} dmg!`];
  if(atk.text) log.push(`📜 ${atk.text.slice(0,55)}${atk.text.length>55?"…":""}`);
  if(def.damage>=(def.hp||60)){
    log.push(`💀 ${def.name} KO'd!`);
    s[defKey].discard.push(def); s[defKey].active=null;
    if(s[atkKey].prizes.length>0){ const p=s[atkKey].prizes.splice(0,1)[0]; s[atkKey].hand.push(p); log.push(`🏅 Prize taken! (${s[atkKey].prizes.length} left)`); }
    if(s[atkKey].prizes.length===0){ s.winner=atkKey; log.push(`🎉 ${atkKey==="player"?"You win!":"Bot wins!"}`); }
    else if(s[defKey].bench.length>0){ s[defKey].active={...s[defKey].bench.splice(0,1)[0],damage:0}; log.push(`⬆️ ${s[defKey].active.name} promoted!`); }
    else{ s.winner=atkKey; log.push(`🎉 No Pokémon left! ${atkKey==="player"?"You win!":"Bot wins!"}`); }
  }
  s.log=[...log,...s.log];
  return s;
}
function botDoTurn(state){
  let s=JSON.parse(JSON.stringify(state));
  if(!s.bot.deck.length){ s.winner="player"; s.log=["🎉 Bot ran out of cards! You win!",...s.log]; return s; }
  s.bot.hand.push(s.bot.deck.shift()); s.log=["🤖 Bot drew a card.",...s.log];
  const bp=s.bot.hand.filter(c=>c.supertype==="Pokémon");
  if(bp.length&&s.bot.bench.length<MAX_BENCH){ const p=bp[0]; s.bot.hand=s.bot.hand.filter(c=>c.uid!==p.uid); s.bot.bench.push(bCard(p)); s.log=[`🤖 Bot benched ${p.name}!`,...s.log]; }
  const be=s.bot.hand.filter(c=>c.supertype==="Energy");
  if(be.length&&s.bot.active){ const e=be[0]; s.bot.hand=s.bot.hand.filter(c=>c.uid!==e.uid); s.bot.active.energyAttached=(s.bot.active.energyAttached||0)+1; s.log=[`⚡ Bot charged ${s.bot.active.name}!`,...s.log]; }
  if(s.bot.active){ const ai=canAttack(s.bot.active,1)?1:canAttack(s.bot.active,0)?0:-1; if(ai>=0) s=doAttack(s,"bot","player",ai); else s.log=[`🤖 ${s.bot.active.name} powering up...`,...s.log]; }
  if(!s.winner){ s.turn="player"; s.energyUsed=false; s.attacked=false; if(!s.player.deck.length){ s.winner="bot"; s.log=["😢 No cards left! Bot wins!",...s.log]; } else{ s.player.hand.push(s.player.deck.shift()); s.log=["📤 You drew a card!",...s.log]; } }
  return s;
}
function initBattle(pp,bp,mode){
  const player=setupSide(buildDeck(pp)), bot=setupSide(buildDeck(bp));
  if(!player||!bot) return null;
  return{player,bot,turn:"player",energyUsed:false,attacked:false,log:["⚔️ Battle! Tap cards for details, attach ⚡, then attack!"],winner:null,mode,passplayTurn:"player1",passplayWaiting:false};
}
function battleReducer(state,action){
  if(!state||state.winner) return state;
  let s=JSON.parse(JSON.stringify(state));
  const{myKey,theirKey}=action;
  if(action.type==="attachEnergy"){
    if(s.energyUsed||!s[myKey].active) return s;
    const eIdx=action.card?s[myKey].hand.findIndex(c=>c.uid===action.card.uid):s[myKey].hand.findIndex(c=>c.supertype==="Energy");
    if(eIdx<0) return s;
    s[myKey].hand.splice(eIdx,1); s[myKey].active.energyAttached=(s[myKey].active.energyAttached||0)+1; s.energyUsed=true;
    s.log=[`⚡ Energy attached! ${s[myKey].active.name} has ⚡${s[myKey].active.energyAttached}`,...s.log];
  } else if(action.type==="playPokemon"){
    const pIdx=action.card?s[myKey].hand.findIndex(c=>c.uid===action.card.uid):s[myKey].hand.findIndex(c=>c.supertype==="Pokémon");
    if(pIdx<0) return s;
    const p=s[myKey].hand.splice(pIdx,1)[0];
    if(!s[myKey].active){ s[myKey].active={...p,damage:0,energyAttached:0}; s.log=[`🃏 ${p.name} is now active!`,...s.log]; }
    else if(s[myKey].bench.length<MAX_BENCH){ s[myKey].bench.push({...p,damage:0,energyAttached:0}); s.log=[`🃏 ${p.name} to bench!`,...s.log]; }
  } else if(action.type==="attack"){
    if(s.attacked||!canAttack(s[myKey].active,action.atkIdx)) return s;
    s=doAttack(s,myKey,theirKey,action.atkIdx); s.attacked=true;
  } else if(action.type==="endTurn"){
    if(s.mode==="passplay"){ s.passplayTurn=myKey==="player"?"player2":"player1"; s.passplayWaiting=true; s.energyUsed=false; s.attacked=false; const nk=myKey==="player"?"bot":"player"; if(s[nk].deck.length){ s[nk].hand.push(s[nk].deck.shift()); } return s; }
    s.turn="bot"; s.energyUsed=false; s.attacked=false;
  } else if(action.type==="resumePassplay"){ s.passplayWaiting=false; }
  return s;
}

// BATTLE GAME

function BattleGame({state,dispatch,onEnd}){
  const [selCard,setSelCard]=React.useState(null);
  const{player,bot,turn,energyUsed,attacked,log,winner,mode,passplayTurn,passplayWaiting}=state;

  if(passplayWaiting){
    const nName=passplayTurn==="player1"?"Player 1":"Player 2";
    return(
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",gap:20,padding:24,textAlign:"center"}}>
        <div style={{fontSize:64}}>🔄</div>
        <h2 style={{fontFamily:"'Fredoka One',cursive",fontSize:28,color:"#fff",margin:0}}>Pass to {nName}!</h2>
        <p style={{color:"rgba(255,255,255,0.4)",fontSize:13}}>Cover screen before handing over</p>
        <button onClick={()=>{setSelCard(null);dispatch({type:"resumePassplay"});}} style={{background:"#FFD700",color:"#000",fontWeight:900,fontSize:17,padding:"14px 32px",borderRadius:16,border:"none",cursor:"pointer",fontFamily:"'Fredoka One',cursive"}}>I'm {nName} — Ready! ✓</button>
      </div>
    );
  }

  const myKey=mode==="passplay"?(passplayTurn==="player1"?"player":"bot"):"player";
  const theirKey=myKey==="player"?"bot":"player";
  const myLabel=mode==="passplay"?(passplayTurn==="player1"?"Player 1":"Player 2"):"You";
  const theirLabel=mode==="passplay"?(passplayTurn==="player1"?"Player 2":"Player 1"):"Bot";
  const mySide=state[myKey], theirSide=state[theirKey];
  const myActive=mySide.active, theirActive=theirSide.active;
  const isMyTurn=mode==="bot"?turn==="player":true;
  const canEnergy=isMyTurn&&!energyUsed&&myActive&&mySide.hand.some(c=>c.supertype==="Energy");
  const canBench=isMyTurn&&!winner&&mySide.hand.some(c=>c.supertype==="Pokémon")&&mySide.bench.length<MAX_BENCH;

  return(
    <div style={{display:"flex",flexDirection:"column",gap:7,padding:8,minHeight:"100%",position:"relative"}}>
      {selCard&&<CardDetailModal card={selCard} onClose={()=>setSelCard(null)}
        onPlayBench={selCard.supertype==="Pokémon"?()=>{dispatch({type:"playPokemon",myKey,theirKey,card:selCard});setSelCard(null);}:undefined}
        canBench={canBench&&selCard.supertype==="Pokémon"}
        onAttachEnergy={selCard.supertype==="Energy"?()=>{dispatch({type:"attachEnergy",myKey,theirKey,card:selCard});setSelCard(null);}:undefined}
        canAttachEnergy={!energyUsed&&!!myActive&&selCard.supertype==="Energy"}
      />}
      {winner&&(
        <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.92)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",zIndex:50,borderRadius:12,gap:14}}>
          <div style={{fontSize:72}}>{winner===myKey?"🏆":"😢"}</div>
          <h2 style={{fontFamily:"'Fredoka One',cursive",fontSize:36,color:"#FFD700",textShadow:"3px 3px 0 #CC0000",margin:0}}>
            {mode==="passplay"?(winner==="player"?"Player 1 Wins!":"Player 2 Wins!"):winner==="player"?"You Win!":"Bot Wins!"}
          </h2>
          {winner==="player"&&mode==="bot"&&<p style={{color:"#4ADE80",fontWeight:700,fontSize:16}}>+{WIN_COINS} coins! 🪙</p>}
          <button onClick={onEnd} style={{background:"#FFD700",color:"#000",fontWeight:900,fontSize:18,padding:"14px 40px",borderRadius:16,border:"none",cursor:"pointer",fontFamily:"'Fredoka One',cursive"}}>Continue</button>
        </div>
      )}

      {/* Opponent */}
      <div style={{background:"rgba(190,18,60,0.1)",border:"1px solid rgba(190,18,60,0.2)",borderRadius:14,padding:"8px 10px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
          <span style={{color:"#FDA4AF",fontSize:11,fontWeight:700}}>⚔️ {theirLabel}{mode==="bot"&&turn==="bot"?" (thinking...)":""}</span>
          <span style={{color:"rgba(255,255,255,0.35)",fontSize:10}}>🏅{theirSide.prizes.length} · 🃏{theirSide.deck.length}</span>
        </div>
        <div style={{display:"flex",alignItems:"flex-start",gap:6}}>
          <div style={{display:"flex",gap:2,flexShrink:0}}>{Array.from({length:Math.min(theirSide.hand.length,5)}).map((_,i)=><CardView key={i} showBack size="xs"/>)}</div>
          <div style={{display:"flex",gap:4,flex:1,justifyContent:"center",flexWrap:"wrap"}}>{theirSide.bench.map(c=><div key={c.uid} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2}}><CardView card={c} size="xs"/><span style={{color:"#FBBF24",fontSize:8}}>⚡{c.energyAttached||0}</span></div>)}</div>
          <div style={{flexShrink:0,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
            {theirActive?<><CardView card={theirActive} size="sm"/><div style={{width:84}}><HpBar pokemon={theirActive}/></div><span style={{color:"#FBBF24",fontSize:9}}>⚡{theirActive.energyAttached||0}</span></>:<div style={{width:84,height:116,borderRadius:10,border:"2px dashed rgba(255,255,255,0.1)",display:"flex",alignItems:"center",justifyContent:"center",color:"rgba(255,255,255,0.12)",fontSize:11}}>KO'd</div>}
          </div>
        </div>
        {theirActive&&<AttackPanel pokemon={theirActive} label={`${theirLabel}'s ${theirActive.name}`}/>}
      </div>

      {/* Log */}
      <div style={{background:"rgba(0,0,0,0.5)",borderRadius:10,padding:"6px 10px",height:58,overflowY:"auto",flexShrink:0,border:"1px solid rgba(255,255,255,0.05)"}}>
        {log.slice(0,10).map((l,i)=><p key={i} style={{color:`rgba(255,255,255,${Math.max(0.15,0.85-i*0.08)})`,fontSize:10,margin:"1px 0",lineHeight:1.4}}>{l}</p>)}
      </div>

      {/* Player */}
      <div style={{background:"rgba(29,78,216,0.1)",border:"1px solid rgba(29,78,216,0.2)",borderRadius:14,padding:"8px 10px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
          <span style={{color:"#93C5FD",fontSize:11,fontWeight:700}}>🛡️ {myLabel}{isMyTurn?" · YOUR TURN":""}</span>
          <span style={{color:"rgba(255,255,255,0.35)",fontSize:10}}>🏅{mySide.prizes.length} · 🃏{mySide.deck.length}</span>
        </div>
        <div style={{display:"flex",alignItems:"flex-start",gap:6}}>
          <div style={{flexShrink:0,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
            {myActive?<><CardView card={myActive} size="sm" onClick={()=>isMyTurn&&setSelCard(myActive)}/><div style={{width:84}}><HpBar pokemon={myActive}/></div><span style={{color:"#FBBF24",fontSize:9}}>⚡{myActive.energyAttached||0}</span></>:<div style={{width:84,height:116,borderRadius:10,border:"2px dashed rgba(255,255,255,0.1)",display:"flex",alignItems:"center",justifyContent:"center",color:"rgba(255,255,255,0.12)",fontSize:11}}>KO'd</div>}
          </div>
          <div style={{display:"flex",gap:4,flex:1,justifyContent:"center",flexWrap:"wrap"}}>{mySide.bench.map(c=><div key={c.uid} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2}}><CardView card={c} size="xs" onClick={()=>isMyTurn&&setSelCard(c)}/><span style={{color:"#FBBF24",fontSize:8}}>⚡{c.energyAttached||0}</span></div>)}</div>
        </div>
        {myActive&&<AttackPanel pokemon={myActive} label={`${myLabel}'s ${myActive.name}`}/>}
      </div>

      {/* Actions */}
      {isMyTurn&&!winner&&(
        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          {myActive?.attacks?.map((atk,i)=>{
            const able=!attacked&&canAttack(myActive,i);
            return(
              <button key={i} onClick={()=>able&&dispatch({type:"attack",atkIdx:i,myKey,theirKey})}
                style={{width:"100%",padding:"10px 14px",borderRadius:14,fontWeight:900,fontSize:13,border:"none",cursor:able?"pointer":"not-allowed",background:able?"linear-gradient(135deg,#DC2626,#9F1239)":"rgba(255,255,255,0.05)",color:able?"#fff":"rgba(255,255,255,0.2)",boxShadow:able?"0 4px 20px rgba(220,38,38,0.4)":"none",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <span>⚔️ {atk.name}</span>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <span style={{display:"flex",gap:2}}>{(atk.cost||[]).map((c,ci)=><span key={ci} style={{background:TYPE_COLORS[c]||"#94A3B8",color:"#fff",fontSize:8,padding:"1px 5px",borderRadius:99,fontWeight:700}}>{TYPE_EMOJI[c]||c[0]}</span>)}</span>
                  <span style={{color:able?"#FBBF24":"rgba(255,255,255,0.2)",fontWeight:900,fontSize:16}}>{atk.damage||"—"}</span>
                </div>
              </button>
            );
          })}
          <button onClick={()=>dispatch({type:"endTurn",myKey,theirKey})} style={{width:"100%",padding:"8px",borderRadius:12,fontWeight:700,fontSize:12,border:"none",cursor:"pointer",background:attacked?"linear-gradient(135deg,#16A34A,#15803D)":"rgba(255,255,255,0.07)",color:attacked?"#fff":"rgba(255,255,255,0.35)"}}>
            {attacked?"✓ End Turn":"Pass Turn"}
          </button>
        </div>
      )}

      {/* Hand */}
      <div style={{borderTop:"1px solid rgba(255,255,255,0.07)",paddingTop:6}}>
        <p style={{color:"rgba(255,255,255,0.3)",fontSize:9,margin:"0 0 5px",fontWeight:700,textTransform:"uppercase",letterSpacing:0.8}}>Hand — Tap to use</p>
        <div style={{overflowX:"auto"}}>
          <div style={{display:"flex",gap:7,padding:"2px"}}>
            {mySide.hand.length===0?<p style={{color:"rgba(255,255,255,0.2)",fontSize:11,padding:"16px 0"}}>Hand is empty</p>:mySide.hand.map(card=>(
              <div key={card.uid} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,flexShrink:0}}>
                <CardView card={card} size="sm" onClick={()=>isMyTurn&&!winner&&setSelCard(card)}/>
                <p style={{color:"rgba(255,255,255,0.3)",fontSize:8,margin:0,width:80,textAlign:"center",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{card.name}</p>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

        ))}
      </div>
      {dailyAvailable&&<button onClick={onDaily} style={{width:"100%",maxWidth:340,background:"linear-gradient(135deg,#FFD700,#FF8C00)",color:"#000",fontWeight:900,fontSize:17,padding:"16px 20px",borderRadius:18,border:"none",cursor:"pointer",boxShadow:"0 6px 24px rgba(255,165,0,0.4)",fontFamily:"'Fredoka One',cursive"}}>🎁 Daily Bonus! +{DAILY_COINS} coins</button>}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,width:"100%",maxWidth:340}}>
        {[{l:"My Cards",i:"🃏",t:"collection",bg:"linear-gradient(135deg,#38BDF8,#1D4ED8)"},{l:"Shop",i:"🛍️",t:"shop",bg:"linear-gradient(135deg,#FB923C,#DC2626)"},{l:"Battle!",i:"⚔️",t:"battle",bg:"linear-gradient(135deg,#F87171,#BE123C)"},{l:"Pokédex",i:"📖",t:"pokedex",bg:"linear-gradient(135deg,#A78BFA,#4F46E5)"}].map(b=>(
          <button key={b.l} onClick={()=>navigate(b.t)} style={{background:b.bg,borderRadius:18,padding:"16px 12px",color:"#fff",textAlign:"center",border:"none",cursor:"pointer",boxShadow:"0 4px 16px rgba(0,0,0,0.3)"}}>
            <div style={{fontSize:36,marginBottom:4}}>{b.i}</div>
            <div style={{fontFamily:"'Fredoka One',cursive",fontSize:15}}>{b.l}</div>
          </button>
        ))}
      </div>
    </div>
  );
}

function CollectionScreen({collection}){
  const [filter,setFilter]=React.useState("All");
  const [search,setSearch]=React.useState("");
  const [detail,setDetail]=React.useState(null);
  const types=["All","Pokémon","Energy",...Object.keys(TYPE_COLORS)];
  const filtered=collection.filter(c=>(filter==="All"||c.supertype===filter||c.types?.includes(filter))&&(!search||c.name.toLowerCase().includes(search.toLowerCase())));
  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
      {detail&&<CardDetailModal card={detail} onClose={()=>setDetail(null)}/>}
      <div style={{padding:"10px 16px 8px",flexShrink:0}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Search cards..." style={{width:"100%",background:"rgba(255,255,255,0.07)",color:"#fff",border:"1px solid rgba(255,255,255,0.1)",borderRadius:12,padding:"8px 14px",fontSize:13,outline:"none",boxSizing:"border-box"}}/>
        <div style={{display:"flex",gap:5,marginTop:8,overflowX:"auto",paddingBottom:4}}>
          {types.map(t=><button key={t} onClick={()=>setFilter(t)} style={{flexShrink:0,padding:"4px 11px",borderRadius:99,fontSize:11,fontWeight:700,border:"none",cursor:"pointer",background:filter===t?(TYPE_COLORS[t]||"#FFD700"):"rgba(255,255,255,0.09)",color:filter===t?"#fff":"rgba(255,255,255,0.55)"}}>{t}</button>)}
        </div>
        <p style={{color:"rgba(255,255,255,0.3)",fontSize:11,margin:"5px 0 0"}}>{filtered.length} cards · Tap to inspect</p>
      </div>
      {filtered.length===0?(
        <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",color:"rgba(255,255,255,0.25)",gap:12}}>
          <div style={{fontSize:56}}>📦</div><p style={{fontSize:14}}>No cards yet — visit the Shop!</p>
        </div>
      ):(
        <div style={{flex:1,overflowY:"auto",padding:"0 16px 100px"}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12}}>
            {filtered.map(card=>(
              <div key={card.uid} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                <CardView card={card} size="md" onClick={()=>setDetail(card)}/>
                <p style={{color:"rgba(255,255,255,0.45)",fontSize:9,textAlign:"center",margin:0,width:"100%",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{card.name}</p>
                {card.hp&&<p style={{color:"#FBBF24",fontSize:8,margin:0}}>{card.hp} HP · {card.rarity}</p>}
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

function ShopScreen({coins,onBuyPack,packAnim,newCards}){
  const [detail,setDetail]=React.useState(null);
  if(packAnim) return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"80vh",gap:24,padding:"0 16px"}}>
      {detail&&<CardDetailModal card={detail} onClose={()=>setDetail(null)}/>}
      <h2 style={{fontFamily:"'Fredoka One',cursive",fontSize:38,color:"#FFD700",textShadow:"3px 3px 0 #CC0000",margin:0}}>New Cards! ✨</h2>
      <div style={{display:"flex",flexWrap:"wrap",justifyContent:"center",gap:14}}>
        {newCards.map((card,i)=>(
          <div key={card.uid} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4,animation:`bounceIn 0.5s ${i*0.1}s both`}}>
            <CardView card={card} size="md" onClick={()=>setDetail(card)}/>
            <p style={{color:"rgba(255,255,255,0.55)",fontSize:9,textAlign:"center",margin:0,maxWidth:100}}>{card.name}</p>
            <p style={{color:"#FBBF24",fontSize:8,margin:0}}>{card.rarity}</p>
          </div>
        ))}
      </div>
      <p style={{color:"rgba(255,255,255,0.35)",fontSize:12}}>Tap a card to read its attacks!</p>
      <button onClick={()=>onBuyPack(null)} style={{background:"#FFD700",color:"#000",fontWeight:900,fontSize:17,padding:"14px 40px",borderRadius:18,border:"none",cursor:"pointer",fontFamily:"'Fredoka One',cursive",boxShadow:"0 4px 20px rgba(255,215,0,0.4)"}}>Add to Collection ✓</button>
    </div>
  );
  return(
    <div style={{padding:"16px",display:"flex",flexDirection:"column",gap:14}}>
      <div style={{background:"rgba(255,215,0,0.1)",border:"1px solid rgba(255,215,0,0.25)",borderRadius:16,padding:"10px 16px",textAlign:"center"}}>
        <span style={{color:"#FFD700",fontWeight:900,fontSize:22}}>🪙 {coins} coins</span>
      </div>
      {PACK_DEFS.map(pack=>(
        <div key={pack.id} style={{background:pack.bg,borderRadius:18,padding:"14px",display:"flex",alignItems:"center",gap:12,boxShadow:"0 4px 20px rgba(0,0,0,0.3)"}}>
          <div style={{fontSize:44,flexShrink:0}}>{pack.emoji}</div>
          <div style={{flex:1,minWidth:0}}>
            <h3 style={{fontFamily:"'Fredoka One',cursive",color:"#fff",fontSize:17,margin:"0 0 2px"}}>{pack.name}</h3>
            <p style={{color:"rgba(255,255,255,0.65)",fontSize:12,margin:"0 0 2px"}}>{pack.desc}</p>
            <p style={{color:"#FBBF24",fontWeight:700,fontSize:13,margin:0}}>🪙 {pack.cost} coins</p>
          </div>
          <button onClick={()=>onBuyPack(pack)} disabled={coins<pack.cost} style={{flexShrink:0,padding:"10px 16px",borderRadius:12,fontWeight:900,fontSize:13,border:"none",cursor:coins>=pack.cost?"pointer":"not-allowed",background:coins>=pack.cost?"#fff":"rgba(255,255,255,0.18)",color:coins>=pack.cost?"#1D4ED8":"rgba(255,255,255,0.4)"}}>
            {coins>=pack.cost?"Open!":"Need coins"}
          </button>
        </div>
      ))}
    </div>
  );
}

function BattleSelect({onStart}){
  return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:24,padding:"32px 16px"}}>
      <h2 style={{fontFamily:"'Fredoka One',cursive",fontSize:42,color:"#FFD700",textShadow:"3px 3px 0 #CC0000",margin:0}}>Battle Mode!</h2>
      <div style={{display:"flex",flexDirection:"column",gap:14,width:"100%",maxWidth:300}}>
        {[{l:"vs Bot",s:"Fight the AI trainer",e:"🤖",m:"bot",bg:"linear-gradient(135deg,#F87171,#BE123C)"},{l:"Pass & Play",s:"2 players, 1 device",e:"👥",m:"passplay",bg:"linear-gradient(135deg,#60A5FA,#4F46E5)"}].map(m=>(
          <button key={m.m} onClick={()=>onStart(m.m)} style={{background:m.bg,color:"#fff",border:"none",borderRadius:20,padding:"20px 24px",cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:16,boxShadow:"0 6px 24px rgba(0,0,0,0.3)"}}>
            <div style={{fontSize:44}}>{m.e}</div>
            <div><div style={{fontFamily:"'Fredoka One',cursive",fontSize:22}}>{m.l}</div><div style={{color:"rgba(255,255,255,0.65)",fontSize:13}}>{m.s}</div></div>
          </button>
        ))}
      </div>
      <div style={{background:"rgba(255,255,255,0.04)",borderRadius:14,padding:"12px 16px",maxWidth:300,width:"100%",border:"1px solid rgba(255,255,255,0.07)"}}>
        <p style={{color:"rgba(255,255,255,0.35)",fontSize:12,margin:"2px 0"}}>⚡ Attach energy → attacks unlock</p>
        <p style={{color:"rgba(255,255,255,0.35)",fontSize:12,margin:"2px 0"}}>🃏 Tap any card for full details</p>
        <p style={{color:"rgba(255,255,255,0.35)",fontSize:12,margin:"2px 0"}}>🏆 Win = 🪙{WIN_COINS} coins!</p>
      </div>
    </div>
  );
}

function PokedexScreen({collection}){
  const [detail,setDetail]=React.useState(null);
  const owned=name=>collection.some(c=>c.name===name);
  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
      {detail&&<CardDetailModal card={detail} onClose={()=>setDetail(null)}/>}
      <div style={{padding:"8px 16px 4px",flexShrink:0}}>
        <p style={{color:"rgba(255,255,255,0.35)",fontSize:11,margin:0}}>Gen 1 · Tap to preview · Grayed = not owned</p>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"0 16px 100px"}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
          {Object.entries(DEXMAP).slice(0,151).map(([name,id])=>{
            const spriteUrl=`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`;
            const own=owned(name);
            const fallback=FALLBACK_POKEMON.find(f=>f.name===name);
            return(
              <div key={id} onClick={()=>{const base=collection.find(c=>c.name===name)||fallback||{name,id:`dex-${id}`,supertype:"Pokémon",subtypes:["Basic"],hp:60,types:["Colorless"],attacks:[],retreatCost:1,rarity:"???",image:null,weaknesses:[],resistances:[]};setDetail({...base,uid:base.uid||uid()});}} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3,cursor:"pointer",opacity:own?1:0.4}}>
                <div style={{width:60,height:60,background:`rgba(255,255,255,${own?0.08:0.03})`,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",border:`1px solid rgba(255,255,255,${own?0.12:0.04})`,overflow:"hidden"}}>
                  <img src={spriteUrl} alt={name} style={{width:"85%",height:"85%",objectFit:"contain",imageRendering:"pixelated"}} onError={e=>e.target.style.display="none"}/>
                </div>
                <p style={{color:own?"rgba(255,255,255,0.6)":"rgba(255,255,255,0.18)",fontSize:8,textAlign:"center",margin:0,maxWidth:60,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{own?name:`#${id}`}</p>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// MAIN APP
// ─────────────────────────────────────────────────────────────────────────────
function App(){
  const [screen,setScreen]=React.useState("home");
  const [coins,setCoins]=React.useState(STARTING_COINS);
  const [collection,setCollection]=React.useState([]);
  const [wins,setWins]=React.useState(0);
  const [lastDaily,setLastDaily]=React.useState(null);
  const [starterPool,setStarterPool]=React.useState([]);
  const [loading,setLoading]=React.useState(true);
  const [packAnim,setPackAnim]=React.useState(false);
  const [newCards,setNewCards]=React.useState([]);
  const [battle,setBattle]=React.useState(null);
  const winHandled=React.useRef(false);
  const coinsRef=React.useRef(STARTING_COINS);
  const winsRef=React.useRef(0);
  React.useEffect(()=>{coinsRef.current=coins;},[coins]);
  React.useEffect(()=>{winsRef.current=wins;},[wins]);

  React.useEffect(()=>{
    async function init(){
      const[c,col,w,ld,st]=await Promise.all([load("ptcg4_coins",STARTING_COINS),load("ptcg4_collection",[]),load("ptcg4_wins",0),load("ptcg4_daily",null),load("ptcg4_starters",null)]);
      setCoins(c);coinsRef.current=c;
      setCollection(col.map(x=>({...x,uid:x.uid||uid()})));
      setWins(w);winsRef.current=w;setLastDaily(ld);
      if(st?.length>0){setStarterPool(st);setLoading(false);return;}
      try{
        const res=await fetch(`${API}/cards?q=supertype:Pok%C3%A9mon subtypes:Basic&pageSize=60&orderBy=name`);
        const data=await res.json();
        const cards=(data.data||[]).filter(c=>(c.attacks?.length||0)>0&&c.images?.small).map(normalizeApiCard);
        const pool=cards.length>0?cards:FALLBACK_POKEMON.map(p=>({...p,uid:uid()}));
        setStarterPool(pool);await save("ptcg4_starters",pool);
      }catch{setStarterPool(FALLBACK_POKEMON.map(p=>({...p,uid:uid()})));}
      setLoading(false);
    }
    init();
  },[]);

  const isDailyAvailable=!lastDaily||(Date.now()-new Date(lastDaily).getTime()>86400000);
  const handleDaily=async()=>{const nc=coinsRef.current+DAILY_COINS,now=new Date().toISOString();setCoins(nc);setLastDaily(now);await save("ptcg4_coins",nc);await save("ptcg4_daily",now);};

  const handleBuyPack=async(pack)=>{
    if(!pack){setPackAnim(false);setNewCards([]);return;}
    if(coinsRef.current<pack.cost)return;
    let cards=[];
    try{
      const res=await fetch(`${API}/cards?q=${encodeURIComponent(pack.query)}&pageSize=20&page=${Math.ceil(Math.random()*6)}`);
      const data=await res.json();
      const pool=(data.data||[]).filter(c=>c.images?.small).map(normalizeApiCard);
      cards=shuffle(pool).slice(0,5);
    }catch{}
    while(cards.length<5)cards.push({...FALLBACK_POKEMON[Math.floor(Math.random()*FALLBACK_POKEMON.length)],uid:uid()});
    const newCol=[...collection,...cards],nc=coinsRef.current-pack.cost;
    setCollection(newCol);setCoins(nc);setNewCards(cards);setPackAnim(true);
    await save("ptcg4_collection",newCol);await save("ptcg4_coins",nc);
  };

  const handleStartBattle=mode=>{
    winHandled.current=false;
    const myPokes=collection.filter(c=>c.supertype==="Pokémon");
    const playerPool=myPokes.length>=4?myPokes:[...myPokes,...shuffle(FALLBACK_POKEMON).slice(0,10-myPokes.length).map(p=>({...p,uid:uid()}))];
    const botPool=shuffle([...FALLBACK_POKEMON,...starterPool.filter(c=>c.supertype==="Pokémon")]).slice(0,16).map(p=>({...p,uid:uid()}));
    const b=initBattle(playerPool,botPool,mode);
    if(!b)return;
    setBattle(b);setScreen("game");
  };

  const dispatch=React.useCallback(action=>{
    setBattle(prev=>{if(!prev||prev.winner)return prev;return battleReducer(prev,action);});
  },[]);

  React.useEffect(()=>{
    if(!battle||battle.turn!=="bot"||battle.winner||battle.mode!=="bot")return;
    const t=setTimeout(()=>{
      const ns=botDoTurn(battle);setBattle(ns);
      if(ns.winner==="player"&&!winHandled.current){winHandled.current=true;const nw=winsRef.current+1,nc=coinsRef.current+WIN_COINS;setWins(nw);setCoins(nc);save("ptcg4_wins",nw);save("ptcg4_coins",nc);}
    },1400);
    return()=>clearTimeout(t);
  },[battle?.turn,battle?.winner]);

  const handleBattleEnd=()=>{setBattle(null);setScreen("home");};
  const NAV=[{id:"home",i:"🏠",l:"Home"},{id:"collection",i:"🃏",l:"Cards"},{id:"shop",i:"🛍️",l:"Shop"},{id:"battle",i:"⚔️",l:"Battle"},{id:"pokedex",i:"📖",l:"Pokédex"}];
  const TITLE={home:"⚡ PokéCards!",collection:"🃏 My Cards",shop:"🛍️ Shop",battle:"⚔️ Battle",pokedex:"📖 Pokédex"};

  if(loading) return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(160deg,#0f0c29,#302b63,#24243e)"}}>
      <div style={{textAlign:"center"}}>
        <div style={{fontSize:72,animation:"bounce 1s infinite"}}>⚡</div>
        <p style={{fontFamily:"'Fredoka One',cursive",fontSize:28,color:"#FFD700",margin:"12px 0"}}>Loading PokéCards...</p>
      </div>
    </div>
  );

  return(
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",maxWidth:440,margin:"0 auto",overflow:"hidden",background:"linear-gradient(160deg,#0f0c29 0%,#302b63 55%,#24243e 100%)"}}>
      {screen!=="game"&&(
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"11px 16px",borderBottom:"1px solid rgba(255,255,255,0.07)",background:"rgba(0,0,0,0.25)",backdropFilter:"blur(12px)",zIndex:10,flexShrink:0}}>
          {screen!=="home"?<button onClick={()=>setScreen("home")} style={{color:"rgba(255,255,255,0.4)",fontSize:13,fontWeight:700,background:"none",border:"none",cursor:"pointer"}}>← Back</button>:<div style={{width:56}}/>}
          <span style={{fontFamily:"'Fredoka One',cursive",color:"#fff",fontSize:17}}>{TITLE[screen]}</span>
          <span style={{background:"linear-gradient(135deg,#FFD700,#FF8C00)",color:"#000",fontWeight:900,fontSize:12,padding:"3px 10px",borderRadius:99}}>🪙 {coins}</span>
        </div>
      )}
      <div style={{flex:1,overflowY:"auto",position:"relative",zIndex:5,display:screen==="game"?"flex":"block",flexDirection:"column"}}>
        {screen==="home"&&<HomeScreen coins={coins} collection={collection} wins={wins} onDaily={handleDaily} dailyAvailable={isDailyAvailable} navigate={setScreen}/>}
        {screen==="collection"&&<CollectionScreen collection={collection}/>}
        {screen==="shop"&&<ShopScreen coins={coins} onBuyPack={handleBuyPack} packAnim={packAnim} newCards={newCards}/>}
        {screen==="battle"&&<BattleSelect onStart={handleStartBattle}/>}
        {screen==="pokedex"&&<PokedexScreen collection={collection}/>}
        {screen==="game"&&battle&&(
          <div style={{display:"flex",flexDirection:"column",flex:1}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 12px",background:"rgba(0,0,0,0.45)",borderBottom:"1px solid rgba(255,255,255,0.07)",flexShrink:0,zIndex:10}}>
              <button onClick={handleBattleEnd} style={{color:"rgba(255,255,255,0.3)",fontSize:12,background:"none",border:"none",cursor:"pointer"}}>✕ Forfeit</button>
              <span style={{fontFamily:"'Fredoka One',cursive",color:"#fff",fontSize:15}}>⚔️ {battle.mode==="passplay"?"Pass & Play":"vs Bot"}</span>
              <span style={{fontSize:11,color:"rgba(255,255,255,0.4)"}}>{battle.winner?"🎮 Over":battle.turn==="player"?"👤 Your turn":"🤖 Bot..."}</span>
            </div>
            <div style={{flex:1,overflowY:"auto",padding:8}}>
              <BattleGame state={battle} dispatch={dispatch} onEnd={handleBattleEnd}/>
            </div>
          </div>
        )}
      </div>
      {screen!=="game"&&(
        <div style={{display:"flex",borderTop:"1px solid rgba(255,255,255,0.07)",background:"rgba(0,0,0,0.35)",backdropFilter:"blur(12px)",zIndex:10,flexShrink:0}}>
          {NAV.map(n=>(
            <button key={n.id} onClick={()=>setScreen(n.id)} style={{flex:1,padding:"10px 4px",display:"flex",flexDirection:"column",alignItems:"center",gap:1,background:"none",border:"none",cursor:"pointer",color:screen===n.id?"#FFD700":"rgba(255,255,255,0.3)"}}>
              <span style={{fontSize:18}}>{n.i}</span>
              <span style={{fontSize:9,fontWeight:700}}>{n.l}</span>
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
</body>
</html>
