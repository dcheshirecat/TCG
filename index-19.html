*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;width:100%;font-family:'Nunito',sans-serif;background:#0f0c29;overscroll-behavior:none}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:99px}
@keyframes bounceIn{0%{transform:scale(0) rotate(-12deg);opacity:0}60%{transform:scale(1.15) rotate(4deg)}100%{transform:scale(1) rotate(0);opacity:1}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes glow{0%,100%{box-shadow:0 0 10px #FFD70088}50%{box-shadow:0 0 28px #FFD700cc}}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:200% center}100%{background-position:-200% center}}
.fc{perspective:1000px}
.fci{transition:transform .65s;transform-style:preserve-3d;position:relative;cursor:pointer}
.fci.flipped{transform:rotateY(180deg)}
.ff,.fb{backface-visibility:hidden;-webkit-backface-visibility:hidden;position:absolute;top:0;left:0}
.fb{transform:rotateY(180deg)}
</style>

window.storage={
  get:async k=>{try{if(window.AndroidStorage){const v=window.AndroidStorage.get(k);return v?{key:k,value:v}:null}}catch(e){}const v=localStorage.getItem(k);return v?{key:k,value:v}:null},
  set:async(k,v)=>{try{if(window.AndroidStorage){window.AndroidStorage.set(k,v);return}}catch(e){}localStorage.setItem(k,v)},
};
async function load(k,d){try{const r=await window.storage.get(k);return r?JSON.parse(r.value):d}catch{return d}}
async function save(k,v){try{await window.storage.set(k,JSON.stringify(v))}catch{}}

const LEVEL_TITLES=["Rookie","Rising Star","Gym Challenger","Elite Trainer","Ace Trainer","Battle Master","Champion","Legend"];
function getLevelTitle(l){return LEVEL_TITLES[Math.min(Math.floor((l-1)/6),LEVEL_TITLES.length-1)]}
function getLevelInfo(xp){let l=1,rem=Math.max(0,xp);while(rem>=l*150&&l<MAX_LEVEL){rem-=l*150;l++}return{level:l,xpIn:rem,xpNeeded:l*150,pct:Math.min(100,(rem/(l*150))*100)}}

// ─── UTILS ─────────────────────────────────────────────────────────────────
const uid=()=>Math.random().toString(36).substr(2,9);
const shuffle=a=>{const r=[...a];for(let i=r.length-1;i>0;i--){const j=0|Math.random()*(i+1);[r[i],r[j]]=[r[j],r[i]]}return r};
const clone=o=>JSON.parse(JSON.stringify(o));
const normalizeApiCard=c=>({uid:uid(),id:c.id,name:c.name,supertype:c.supertype||"Pokémon",subtypes:c.subtypes||["Basic"],hp:parseInt(c.hp)||60,types:c.types||["Colorless"],attacks:(c.attacks||[]).slice(0,2).map(a=>({name:a.name,cost:a.cost||[],damage:parseInt(a.damage)||0,text:a.text||""})),retreatCost:(c.retreatCost||[]).length,image:c.images?.small||null,rarity:c.rarity||"Common",weaknesses:c.weaknesses||[],resistances:c.resistances||[]});
const makeEnergy=t=>({uid:uid(),id:`e-${t}-${uid()}`,name:`${t} Energy`,supertype:"Energy",subtypes:["Basic"],hp:null,types:[t],attacks:[],retreatCost:0,image:null,rarity:"Common",weaknesses:[],resistances:[]});
const sumEnergy=p=>Object.values(p?.energies||{}).reduce((a,b)=>a+b,0);

// ─── TCG RULES ─────────────────────────────────────────────────────────────
function canUseAttack(poke,idx=0){
  const atk=poke?.attacks?.[idx];
  if(!atk)return false;
  const cost=atk.cost||[];
  if(!cost.length)return true;
  const avail=clone(poke.energies||{});
  let colorless=0;
  for(const c of cost){
    if(c==="Colorless"){colorless++;continue}
    if((avail[c]||0)>0)avail[c]--;else return false;
  }
  return Object.values(avail).reduce((a,b)=>a+b,0)>=colorless;
}

function calcDamage(base,attacker,defender,ignoreModifiers){
  if(base<=0||ignoreModifiers)return base;
  const attType=attacker.types?.[0];
  let dmg=base;
  const weakList=defender.weaknesses||[];
  const isWeak=weakList.some(w=>w.type===attType)||(WEAK_CHART[attType]&&defender.types?.some(t=>t===WEAK_CHART[attType]));
  if(isWeak)dmg*=2;
  const resistList=defender.resistances||[];
  if(resistList.some(r=>r.type===attType))dmg=Math.max(0,dmg-30);
  return dmg;
}

function parseAtkText(text=""){
  const t=text.toLowerCase();
  const status=/paralyz/i.test(t)?"Paralyzed":/asleep|sleep/i.test(t)?"Asleep":/poison/i.test(t)?"Poisoned":/confus/i.test(t)?"Confused":null;
  const needsCoin=/flip a coin/i.test(t);
  const extraHeads=(text.match(/if heads[^.]*?(\d+) more damage/i)||[])[1];
  const selfTails=(text.match(/if tails[^.]*?(\d+) damage to itself/i)||[])[1];
  const healSelf=t.includes("heal")&&t.includes("this pokémon")?(text.match(/heal (\d+)/i)||[])[1]:null;
  const ignoreModifiers=/not affected by weakness or resistance/i.test(t);
  const discardEnergy=()=>{
    const m=text.match(/discard (?:(\d+)|a|an) (\w+) energy/i);
    if(m){const cnt=m[1]?parseInt(m[1]):1;const tp=m[2];if(tp&&!/^(an?|this)$/i.test(tp))return{type:tp.charAt(0).toUpperCase()+tp.slice(1).toLowerCase(),count:cnt}}
    if(/discard an? energy/i.test(t))return{type:"any",count:1};
    return null;
  };
  return{status,needsCoin,extraHeads:extraHeads?parseInt(extraHeads):0,selfTails:selfTails?parseInt(selfTails):0,healSelf:healSelf?parseInt(healSelf):0,ignoreModifiers,discard:discardEnergy()};
}

function applyStatusTick(side,log){
  const s=clone(side);if(!s.active)return{side:s,log};
  const logs=[...log];const st=s.active.status;
  if(st==="Poisoned"){s.active.damage=(s.active.damage||0)+10;logs.push(`☠️ ${s.active.name} took 10 poison damage!`)}
  if(st==="Asleep"){if(Math.random()<0.5){s.active.status=null;logs.push(`💤 ${s.active.name} woke up!`)}else logs.push(`💤 ${s.active.name} is still asleep.`)}
  if(st==="Paralyzed"){s.active.status=null;logs.push(`⚡ ${s.active.name}'s paralysis wore off.`)}
  if(s.active.damage>=(s.active.hp||60)){
    logs.push(`💀 ${s.active.name} KO'd by status!`);
    s.discard.push(s.active);s.active=null;
    if(s.bench.length>0){s.active={...s.bench.splice(0,1)[0],damage:0,status:null};logs.push(`⬆️ ${s.active.name} promoted!`)}
  }
  return{side:s,log:logs};
}

// ─── DECK BUILDER ──────────────────────────────────────────────────────────
function autoBuildDeck(collection){
  const pokes=[...collection.filter(c=>c.supertype==="Pokémon")];
  const trainers=collection.filter(c=>c.supertype==="Trainer");
  const selPokes=pokes.sort((a,b)=>(b.hp||0)-(a.hp||0)).slice(0,DECK_POKE).map(p=>({...p,uid:uid()}));
  const selTrainers=shuffle(trainers).slice(0,DECK_TRAINER).map(t=>({...t,uid:uid()}));
  const typeCounts={};
  selPokes.forEach(p=>(p.types||["Colorless"]).forEach(t=>{typeCounts[t]=(typeCounts[t]||0)+1}));
  const sorted=Object.entries(typeCounts).sort((a,b)=>b[1]-a[1]);
  const t1=sorted[0]?.[0]||"Colorless",t2=sorted[1]?.[0]||t1;
  const eNeeded=DECK_POKE+DECK_TRAINER+DECK_ENERGY-(selPokes.length+selTrainers.length);
  const e1=Math.ceil(eNeeded*.7),e2=Math.max(0,eNeeded-e1);
  const energies=[...Array.from({length:e1},()=>makeEnergy(t1)),...Array.from({length:e2},()=>makeEnergy(t2))];
  return shuffle([...selPokes,...selTrainers,...energies]);
}

// ─── BATTLE ENGINE ─────────────────────────────────────────────────────────
function setupSide(deck){
  const d=[...deck];
  const pi=d.findIndex(c=>c.supertype==="Pokémon");
  if(pi<0)return null;
  const active={...d.splice(pi,1)[0],uid:uid(),damage:0,energies:{},status:null};
  const prizes=d.splice(0,PRIZE_COUNT);
  const hand=d.splice(0,HAND_SIZE);
  return{active,bench:[],hand,deck:d,prizes,discard:[],retreated:false,supporterUsed:false};
}

function buildBotDeck(pool){
  const pokes=shuffle(pool.filter(c=>c.supertype==="Pokémon")).slice(0,DECK_POKE).map(p=>({...p,uid:uid()}));
  const t1=pokes[0]?.types?.[0]||"Colorless",t2=pokes[1]?.types?.[0]||t1;
  const energies=[...Array.from({length:8},()=>makeEnergy(t1)),...Array.from({length:4},()=>makeEnergy(t2))];
  const trainers=shuffle(TRAINER_POOL).slice(0,2).map(t=>({...t,uid:uid()}));
  return shuffle([...pokes,...energies,...trainers]);
}

function doAttack(state,atkKey,defKey,atkIdx,coinResult){
  let s=clone(state);
  const att=s[atkKey].active,def=s[defKey].active;
  if(!att||!def)return s;
  const atk=att.attacks?.[atkIdx];if(!atk)return s;
  const info=parseAtkText(atk.text||"");
  const log=[];

  // Status blocks
  if(att.status==="Paralyzed"){
    att.status=null;s[atkKey].active=att;
    s.log=[`🔒 ${att.name} was Paralyzed and couldn't attack! (status cleared)`,...s.log];return s;
  }
  if(att.status==="Asleep"){s.log=[`💤 ${att.name} is Asleep — can't attack!`,...s.log];return s}
  if(att.status==="Confused"&&coinResult===false){
    const selfDmg=30;att.damage=(att.damage||0)+selfDmg;s[atkKey].active=att;
    s.log=[`😵 Confused! ${att.name} hurt itself for ${selfDmg}!`,...s.log];return s;
  }

  let baseDmg=atk.damage||0;
  if(info.needsCoin){
    if(coinResult===true)baseDmg+=info.extraHeads;
    else if(coinResult===false&&info.selfTails>0){att.damage=(att.damage||0)+info.selfTails;s[atkKey].active=att;s.log=[`💨 Tails! ${att.name} hurt itself for ${info.selfTails}!`,...s.log]}
  }

  const finalDmg=calcDamage(baseDmg,att,def,info.ignoreModifiers);
  def.damage=(def.damage||0)+finalDmg;
  if(finalDmg!==baseDmg&&baseDmg>0)log.push(`💥 ${att.name} → ${atk.name}: ${finalDmg}dmg${finalDmg>baseDmg?" (weakness!)":" (resistance)"}`);
  else log.push(`💥 ${att.name} → ${atk.name}: ${finalDmg}dmg`);

  // Self-heal from attack
  if(info.healSelf>0){att.damage=Math.max(0,(att.damage||0)-info.healSelf);log.push(`💚 ${att.name} healed ${info.healSelf}!`)}

  // Status condition applied
  const applySt=info.needsCoin?coinResult===true?info.status:null:info.status;
  if(applySt&&def.status!==applySt){def.status=applySt;log.push(`🔔 ${def.name} is now ${applySt}!`)}

  // Energy discard on attack
  if(info.discard){
    att.energies=att.energies||{};
    if(info.discard.type==="any"){
      for(const [t,c] of Object.entries(att.energies)){if(c>0){att.energies[t]=Math.max(0,c-1);log.push(`🗑️ 1 Energy discarded from ${att.name}`);break}}
    } else {
      att.energies[info.discard.type]=Math.max(0,(att.energies[info.discard.type]||0)-info.discard.count);
      log.push(`🗑️ ${info.discard.count} ${info.discard.type} Energy discarded`);
    }
  }

  s[atkKey].active=att;s[defKey].active=def;
  s.statsThisBattle={...(s.statsThisBattle||{}),damage:(s.statsThisBattle?.damage||0)+finalDmg};

  // KO check helper
  function tryKO(dKey,aKey,pokemon){
    if((pokemon.damage||0)<(pokemon.hp||60))return;
    log.push(`💀 ${pokemon.name} KO'd!`);
    s[dKey].discard.push(pokemon);s[dKey].active=null;
    s.statsThisBattle.kos=(s.statsThisBattle?.kos||0)+1;
    if(s[aKey].prizes.length>0){const p=s[aKey].prizes.splice(0,1)[0];s[aKey].hand.push(p);log.push(`🏅 Prize taken! (${s[aKey].prizes.length} left)`)}
    if(s[aKey].prizes.length===0){s.winner=aKey;log.push(`🎉 ${aKey==="player"?"You win!":"Bot wins!"}`)}
    else if(s[dKey].bench.length>0){s[dKey].active={...s[dKey].bench.splice(0,1)[0],damage:0,status:null};log.push(`⬆️ ${s[dKey].active.name} promoted!`)}
    else{s.winner=aKey;log.push(`🎉 No Pokémon left — ${aKey==="player"?"You win!":"Bot wins!"}`)}
  }
  tryKO(defKey,atkKey,def);
  if(!s.winner&&(att.damage||0)>=(att.hp||60))tryKO(atkKey,defKey,att);

  s.log=[...log,...s.log];return s;
}

function doRetreat(state,myKey,benchIdx){
  let s=clone(state);const side=s[myKey];
  if(!side.active||benchIdx<0||benchIdx>=side.bench.length||side.retreated)return s;
  const cost=side.active.retreatCost||0;
  if(sumEnergy(side.active)<cost){s.log=[`❌ Need ${cost} energy to retreat (have ${sumEnergy(side.active)})`,...s.log];return s}
  let toDrop=cost;const en=clone(side.active.energies||{});
  for(const t of Object.keys(en)){while(en[t]>0&&toDrop>0){en[t]--;toDrop--}if(!en[t])delete en[t];if(!toDrop)break}
  const promoted={...side.bench.splice(benchIdx,1)[0],status:null};
  side.bench.push({...side.active,energies:en,status:null});
  side.active=promoted;side.retreated=true;
  s[myKey]=side;s.log=[`🔄 Retreated! ${promoted.name} is now Active!`,...s.log];return s;
}

function doEvolve(state,myKey,evoCard,isActive,benchIdx){
  let s=clone(state);const side=s[myKey];
  const hi=side.hand.findIndex(c=>c.uid===evoCard.uid);if(hi<0)return s;
  side.hand.splice(hi,1);
  const evolveTarget=(isActive?side.active:side.bench[benchIdx]);
  if(!evolveTarget)return s;
  const evolved={...evoCard,uid:evolveTarget.uid,damage:evolveTarget.damage,energies:evolveTarget.energies,status:null};
  if(isActive)side.active=evolved;else side.bench[benchIdx]=evolved;
  s[myKey]=side;
  s.statsThisBattle={...(s.statsThisBattle||{}),evos:(s.statsThisBattle?.evos||0)+1};
  s.log=[`🌟 ${evolveTarget.name} evolved into ${evoCard.name}!`,...s.log];return s;
}

function doTrainer(state,myKey,theirKey,card){
  let s=clone(state);const side=s[myKey];
  const hi=side.hand.findIndex(c=>c.uid===card.uid);if(hi<0)return s;
  side.hand.splice(hi,1);side.discard.push(card);
  const eff=card.effect||"";const log=[];
  if(eff==="heal30"&&side.active){side.active.damage=Math.max(0,(side.active.damage||0)-30);log.push(`💊 Potion healed 30 from ${side.active.name}!`)}
  else if(eff==="healall"&&side.active){side.active.damage=0;side.active.energies={};log.push(`💊 Max Potion! ${side.active.name} fully healed!`)}
  else if(eff==="switch"&&side.bench.length>0){const b=side.bench.splice(0,1)[0];side.bench.push({...side.active,status:null});side.active={...b,status:null};log.push(`🔄 Switch! ${b.name} is now Active!`)}
  else if(eff==="draw2"){const d=side.deck.splice(0,2);side.hand.push(...d);log.push(`🃏 Bill! Drew ${d.length} cards!`)}
  else if(eff==="draw6discard"){const h=[...side.hand];side.discard.push(...h);side.hand=[];const d=side.deck.splice(0,6);side.hand.push(...d);log.push(`📚 Research! Drew ${d.length} cards!`)}
  else if(eff==="marnie"){const oKey=myKey==="player"?"bot":"player";const mh=[...side.hand],oh=[...s[oKey].hand];side.deck=[...shuffle(mh),...side.deck];s[oKey].deck=[...shuffle(oh),...s[oKey].deck];side.hand=side.deck.splice(0,5);s[oKey].hand=s[oKey].deck.splice(0,4);log.push(`🔀 Marnie! You drew 5, opponent drew 4!`)}
  else if(eff==="energyretrieval"){const en=side.discard.filter(c=>c.supertype==="Energy").slice(0,2);side.discard=side.discard.filter(c=>!en.includes(c));side.hand.push(...en);log.push(`⚡ Retrieved ${en.length} Energy!`)}
  else if(eff==="nestball"){const pi=side.deck.findIndex(c=>c.supertype==="Pokémon"&&c.subtypes?.includes("Basic"));if(pi>=0&&side.bench.length<MAX_BENCH){const p=side.deck.splice(pi,1)[0];side.bench.push({...p,damage:0,energies:{},status:null});log.push(`🔵 Poké Ball! ${p.name} on Bench!`)}}
  else log.push(`🃏 ${card.name} played!`);
  s[myKey]=side;s.log=[...log,...s.log];return s;
}

function botTurn(state){
  let s=clone(state);
  if(!s.bot.deck.length){s.winner="player";s.log=["🎉 Bot ran out of cards! You win!",...s.log];return s}
  s.bot.hand.push(s.bot.deck.shift());s.log=["🤖 Bot drew.",...s.log];
  // Play trainer
  const bt=s.bot.hand.find(c=>c.supertype==="Trainer");
  if(bt&&Math.random()<0.5)s=doTrainer(s,"bot","player",bt);
  // Bench Pokémon
  const bp=s.bot.hand.filter(c=>c.supertype==="Pokémon"&&(c.subtypes?.includes("Basic")||(!c.subtypes?.includes("Stage 1")&&!c.subtypes?.includes("Stage 2"))));
  if(bp.length&&s.bot.bench.length<MAX_BENCH){const p=bp[0];s.bot.hand=s.bot.hand.filter(c=>c.uid!==p.uid);s.bot.bench.push({...p,uid:uid(),damage:0,energies:{},status:null});s.log=[`🤖 Benched ${p.name}!`,...s.log]}
  // Evolve
  if(s.bot.active){
    const ec=s.bot.hand.find(c=>c.supertype==="Pokémon"&&EVO_FROM[c.name]===s.bot.active.name);
    if(ec)s=doEvolve(s,"bot",ec,true,-1);
  }
  // Attach energy (prefer matching type)
  if(s.bot.active){
    const at=s.bot.active.types?.[0]||"Colorless";
    const me=s.bot.hand.find(e=>e.supertype==="Energy"&&e.types?.[0]===at)||s.bot.hand.find(e=>e.supertype==="Energy");
    if(me){s.bot.hand=s.bot.hand.filter(c=>c.uid!==me.uid);const et=me.types?.[0]||"Colorless";s.bot.active.energies=s.bot.active.energies||{};s.bot.active.energies[et]=(s.bot.active.energies[et]||0)+1;s.log=[`⚡ Bot powered ${s.bot.active.name}!`,...s.log]}
  }
  // Attack (pick best available, auto coin flip)
  if(s.bot.active&&!s.winner){
    const ai=canUseAttack(s.bot.active,1)?1:canUseAttack(s.bot.active,0)?0:-1;
    if(ai>=0){
      const atk=s.bot.active.attacks[ai];
      const info=parseAtkText(atk.text||"");
      const coin=info.needsCoin?Math.random()<0.5:null;
      s=doAttack(s,"bot","player",ai,coin);
    } else s.log=[`🤖 ${s.bot.active.name} charging...`,...s.log];
  }
  if(!s.winner){
    // Status ticks
    const r1=applyStatusTick(s.player,s.log);s.player=r1.side;s.log=r1.log;
    const r2=applyStatusTick(s.bot,s.log);s.bot=r2.side;s.log=r2.log;
    if(!s.player.active&&!s.player.bench.length)s.winner="bot";
    if(!s.bot.active&&!s.bot.bench.length)s.winner="player";
    if(!s.winner){
      s.turn="player";s.energyUsed=false;s.attacked=false;s.bot.retreated=false;s.bot.supporterUsed=false;
      if(!s.player.deck.length){s.winner="bot";s.log=["😢 No cards left! Bot wins!",...s.log]}
      else{s.player.hand.push(s.player.deck.shift());s.log=["📤 You drew a card!",...s.log]}
    }
  }
  return s;
}

function initBattle(playerDeck,botPool,mode){
  const player=setupSide(playerDeck);
  const bot=setupSide(buildBotDeck(botPool));
  if(!player||!bot)return null;
  return{player,bot,turn:"player",energyUsed:false,attacked:false,
    log:["⚔️ Battle! On your first turn you cannot attack. Tap hand cards to play them."],
    winner:null,mode,passplayTurn:"player1",passplayWaiting:false,
    statsThisBattle:{kos:0,damage:0,evos:0},firstTurn:true};
}

function battleReducer(s,action){
  if(!s||s.winner)return s;
  let st=clone(s);
  const{myKey,theirKey}=action;
  if(action.type==="attachEnergy"){
    if(st.energyUsed)return st;
    const ei=action.card?st[myKey].hand.findIndex(c=>c.uid===action.card.uid):st[myKey].hand.findIndex(c=>c.supertype==="Energy");
    if(ei<0)return st;
    const ec=st[myKey].hand.splice(ei,1)[0];
    const et=ec.types?.[0]||"Colorless";
    let tgt=action.target==="active"?st[myKey].active:typeof action.target==="number"?st[myKey].bench[action.target]:null;
    if(!tgt)return st;
    tgt.energies=tgt.energies||{};tgt.energies[et]=(tgt.energies[et]||0)+1;
    st.energyUsed=true;st.log=[`⚡ ${et} Energy → ${tgt.name}! (${sumEnergy(tgt)} total)`,...st.log];
  } else if(action.type==="playPokemon"){
    const pi=action.card?st[myKey].hand.findIndex(c=>c.uid===action.card.uid):-1;if(pi<0)return st;
    const p=st[myKey].hand.splice(pi,1)[0];
    if(!st[myKey].active){st[myKey].active={...p,uid:uid(),damage:0,energies:{},status:null};st.log=[`🃏 ${p.name} is now Active!`,...st.log]}
    else if(st[myKey].bench.length<MAX_BENCH){st[myKey].bench.push({...p,uid:uid(),damage:0,energies:{},status:null});st.log=[`🃏 ${p.name} to Bench!`,...st.log]}
  } else if(action.type==="playTrainer"){
    st=doTrainer(st,myKey,theirKey,action.card);
  } else if(action.type==="evolve"){
    st=doEvolve(st,myKey,action.card,action.isActive,action.benchIdx);
  } else if(action.type==="retreat"){
    st=doRetreat(st,myKey,action.benchIdx);
  } else if(action.type==="attack"){
    if(st.attacked||st.firstTurn||!canUseAttack(st[myKey].active,action.atkIdx))return st;
    st=doAttack(st,myKey,theirKey,action.atkIdx,action.coinResult);st.attacked=true;
  } else if(action.type==="endTurn"){
    if(st.mode==="passplay"){
      st.passplayTurn=myKey==="player"?"player2":"player1";st.passplayWaiting=true;
      st.energyUsed=false;st.attacked=false;st.firstTurn=false;st[myKey].retreated=false;st[myKey].supporterUsed=false;
      const nk=myKey==="player"?"bot":"player";
      const r=applyStatusTick(st[nk],st.log);st[nk]=r.side;st.log=r.log;
      if(st[nk].deck.length)st[nk].hand.push(st[nk].deck.shift());return st;
    }
    st.firstTurn=false;st.turn="bot";st.energyUsed=false;st.attacked=false;st[myKey].retreated=false;st[myKey].supporterUsed=false;
  } else if(action.type==="resumePassplay"){st.passplayWaiting=false;st.firstTurn=false}
  return st;
}

  const theirLabel=mode==="passplay"?(passplayTurn==="player1"?"P2":"P1"):"Bot";
  const mySide=state[myKey],theirSide=state[theirKey];
  const myActive=mySide.active,theirActive=theirSide.active;
  const isMyTurn=mode==="bot"?turn==="player":true;
  const canRetreat=isMyTurn&&!winner&&myActive&&mySide.bench.length>0&&!mySide.retreated&&sumEnergy(myActive)>=(myActive.retreatCost||0);

  const handleCardTap=card=>{
    if(!isMyTurn||winner)return;
    if(card.supertype==="Energy"){setEnergyTarget(card);return}
    if(card.supertype==="Trainer"){dispatch({type:"playTrainer",myKey,theirKey,card});return}
    if(card.supertype==="Pokémon"){
      // Check if it's an evolution card
      if(EVO_FROM[card.name]){
        const targets=[];
        if(myActive?.name===EVO_FROM[card.name])targets.push({poke:myActive,isActive:true,benchIdx:-1,label:`Active: ${myActive.name}`});
        mySide.bench.forEach((b,i)=>{if(b.name===EVO_FROM[card.name])targets.push({poke:b,isActive:false,benchIdx:i,label:`Bench: ${b.name}`})});
        if(targets.length>0){setEvolvePicking({card,targets});return}
      }
      setSelCard(card);
    }
  };

  const handleAttack=i=>{
    if(!myActive||attacked||firstTurn||!canUseAttack(myActive,i))return;
    const atk=myActive.attacks?.[i];if(!atk)return;
    const info=parseAtkText(atk.text||"");
    if(info.needsCoin){setCoinFlip({atkIdx:i,confused:myActive.status==="Confused"});return}
    dispatch({type:"attack",atkIdx:i,myKey,theirKey,coinResult:null});
  };

  const retireBtnStyle=canRetreat?{background:"linear-gradient(135deg,#60A5FA,#2563EB)",color:"#fff"}:{background:"rgba(255,255,255,0.06)",color:"rgba(255,255,255,0.2)"};

  return<div style={{display:"flex",flexDirection:"column",gap:6,padding:7,minHeight:"100%",position:"relative"}}>
    {coinFlip&&<CoinFlipModal onResult={r=>{
      if(coinFlip.confused&&!r){dispatch({type:"attack",atkIdx:coinFlip.atkIdx,myKey,theirKey,coinResult:false})}
      else{dispatch({type:"attack",atkIdx:coinFlip.atkIdx,myKey,theirKey,coinResult:r})}
      setCoinFlip(null);
    }}/>}
    {energyTarget&&<EnergyTargetModal card={energyTarget} side={mySide} energyUsed={energyUsed} onAttach={tgt=>{dispatch({type:"attachEnergy",myKey,theirKey,card:energyTarget,target:tgt});setEnergyTarget(null)}} onClose={()=>setEnergyTarget(null)}/>}
    {evolvePicking&&<div onClick={()=>setEvolvePicking(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.9)",zIndex:210,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"linear-gradient(160deg,#1e1b4b,#0f0c29)",borderRadius:20,padding:18,width:"100%",maxWidth:300,border:"2px solid #FBBF24",animation:"slideUp 0.2s ease"}}>
        <h3 style={{fontFamily:"'Fredoka One',cursive",color:"#FFD700",fontSize:20,margin:"0 0 10px"}}>🌟 Evolve into {evolvePicking.card.name}!</h3>
        {evolvePicking.targets.map((t,i)=><button key={i} onClick={()=>{dispatch({type:"evolve",myKey,theirKey,card:evolvePicking.card,isActive:t.isActive,benchIdx:t.benchIdx});setEvolvePicking(null)}} style={{width:"100%",padding:"10px",marginBottom:6,borderRadius:11,background:"linear-gradient(135deg,#FBBF24,#D97706)",color:"#000",fontWeight:800,fontSize:13,border:"none",cursor:"pointer"}}>{t.label}</button>)}
        <button onClick={()=>setEvolvePicking(null)} style={{width:"100%",padding:"8px",borderRadius:11,background:"rgba(255,255,255,0.07)",color:"rgba(255,255,255,0.5)",fontWeight:700,fontSize:12,border:"none",cursor:"pointer"}}>Cancel</button>
      </div>
    </div>}
    {retreatPicking&&<div onClick={()=>setRetreatPicking(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.9)",zIndex:210,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"linear-gradient(160deg,#1e1b4b,#0f0c29)",borderRadius:20,padding:18,width:"100%",maxWidth:300,border:"2px solid #60A5FA",animation:"slideUp 0.2s ease"}}>
        <h3 style={{fontFamily:"'Fredoka One',cursive",color:"#60A5FA",fontSize:20,margin:"0 0 6px"}}>🔄 Retreat {myActive?.name}</h3>
        <p style={{color:"rgba(255,255,255,0.4)",fontSize:12,margin:"0 0 10px"}}>Costs {myActive?.retreatCost||0} ⚡ energy. Choose replacement:</p>
        {mySide.bench.map((b,i)=><button key={i} onClick={()=>{dispatch({type:"retreat",myKey,theirKey,benchIdx:i});setRetreatPicking(false)}} style={{width:"100%",padding:"10px",marginBottom:6,borderRadius:11,background:"linear-gradient(135deg,#60A5FA,#2563EB)",color:"#fff",fontWeight:800,fontSize:13,border:"none",cursor:"pointer",display:"flex",alignItems:"center",gap:8}}>
          {getSprite(b.name)&&<img src={getSprite(b.name)} style={{width:28,height:28,objectFit:"contain",imageRendering:"pixelated"}} onError={e=>e.target.style.display="none"}/>}
          {b.name} ({Math.max(0,(b.hp||60)-(b.damage||0))}/{b.hp||60} HP)
        </button>)}
        <button onClick={()=>setRetreatPicking(false)} style={{width:"100%",padding:"8px",borderRadius:11,background:"rgba(255,255,255,0.07)",color:"rgba(255,255,255,0.5)",fontWeight:700,fontSize:12,border:"none",cursor:"pointer"}}>Cancel</button>
      </div>
    </div>}
    {selCard&&<CardDetailModal card={selCard} onClose={()=>setSelCard(null)} actionButtons={[
      selCard.supertype==="Pokémon"&&{label:"🃏 Play to Bench",fn:()=>{dispatch({type:"playPokemon",myKey,theirKey,card:selCard});setSelCard(null)},disabled:mySide.bench.length>=MAX_BENCH,color:"linear-gradient(135deg,#16A34A,#15803D)"},
    ].filter(Boolean)}/>}
    {winner&&<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.93)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",zIndex:50,borderRadius:12,gap:14}}>
      <div style={{fontSize:72}}>{winner===myKey?"🏆":"😢"}</div>
      <h2 style={{fontFamily:"'Fredoka One',cursive",fontSize:34,color:"#FFD700",textShadow:"3px 3px 0 #CC0000",margin:0}}>
        {mode==="passplay"?(winner==="player"?"P1 Wins!":"P2 Wins!"):winner==="player"?"You Win!":"Bot Wins!"}
      </h2>
      {winner==="player"&&mode==="bot"&&<p style={{color:"#4ADE80",fontWeight:700,fontSize:15}}>+{WIN_COINS} coins & +50 XP! 🪙</p>}
      <button onClick={onEnd} style={{background:"#FFD700",color:"#000",fontWeight:900,fontSize:17,padding:"13px 36px",borderRadius:16,border:"none",cursor:"pointer",fontFamily:"'Fredoka One',cursive"}}>Continue</button>
    </div>}

    {/* Opponent field */}
    <div style={{background:"rgba(190,18,60,0.1)",border:"1px solid rgba(190,18,60,0.18)",borderRadius:13,padding:"7px 9px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
        <span style={{color:"#FDA4AF",fontSize:11,fontWeight:700}}>⚔️ {theirLabel}{mode==="bot"&&turn==="bot"?" (thinking...)":""}</span>
        <span style={{color:"rgba(255,255,255,0.3)",fontSize:10}}>🏅{theirSide.prizes.length} 🃏{theirSide.deck.length}</span>
      </div>
      <div style={{display:"flex",alignItems:"flex-start",gap:5}}>
        <div style={{display:"flex",gap:2,flexShrink:0}}>{Array.from({length:Math.min(theirSide.hand.length,5)}).map((_,i)=><CardView key={i} showBack size="xs"/>)}</div>
        <div style={{display:"flex",gap:3,flex:1,justifyContent:"center",flexWrap:"wrap"}}>
          {theirSide.bench.map(c=><div key={c.uid} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:1}}>
            <CardView card={c} size="xs"/><EnergyDots energies={c.energies} max={4}/><StatusBadge status={c.status}/><div style={{width:52}}><HpBar pokemon={c} compact/></div>
          </div>)}
        </div>
        <div style={{flexShrink:0,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
          {theirActive?<><CardView card={theirActive} size="sm"/><EnergyDots energies={theirActive.energies}/><StatusBadge status={theirActive.status}/><div style={{width:84}}><HpBar pokemon={theirActive}/></div></>:<div style={{width:84,height:116,borderRadius:10,border:"2px dashed rgba(255,255,255,0.1)",display:"flex",alignItems:"center",justifyContent:"center",color:"rgba(255,255,255,0.12)",fontSize:11}}>KO'd</div>}
        </div>
      </div>
      {theirActive&&<AttackPanel pokemon={theirActive} label={`${theirLabel}: ${theirActive.name}`}/>}
    </div>

    {/* Battle log */}
    <div style={{background:"rgba(0,0,0,0.48)",borderRadius:10,padding:"5px 9px",height:54,overflowY:"auto",flexShrink:0,border:"1px solid rgba(255,255,255,0.05)"}}>
      {log.slice(0,10).map((l,i)=><p key={i} style={{color:`rgba(255,255,255,${Math.max(0.15,0.85-i*0.08)})`,fontSize:10,margin:"1px 0",lineHeight:1.4}}>{l}</p>)}
    </div>

    {/* Player field */}
    <div style={{background:"rgba(29,78,216,0.1)",border:"1px solid rgba(29,78,216,0.2)",borderRadius:13,padding:"7px 9px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
        <span style={{color:"#93C5FD",fontSize:11,fontWeight:700}}>🛡️ {myLabel}{isMyTurn?" · YOUR TURN":""}{firstTurn?" (no attack first turn)":""}</span>
        <span style={{color:"rgba(255,255,255,0.3)",fontSize:10}}>🏅{mySide.prizes.length} 🃏{mySide.deck.length}</span>
      </div>
      <div style={{display:"flex",alignItems:"flex-start",gap:5}}>
        <div style={{flexShrink:0,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
          {myActive?<><CardView card={myActive} size="sm" onClick={()=>isMyTurn&&setSelCard(myActive)}/><EnergyDots energies={myActive.energies}/><StatusBadge status={myActive.status}/><div style={{width:84}}><HpBar pokemon={myActive}/></div></>:<div style={{width:84,height:116,borderRadius:10,border:"2px dashed rgba(255,255,255,0.1)",display:"flex",alignItems:"center",justifyContent:"center",color:"rgba(255,255,255,0.12)",fontSize:11}}>KO'd</div>}
        </div>
        <div style={{display:"flex",gap:3,flex:1,justifyContent:"center",flexWrap:"wrap"}}>
          {mySide.bench.map(c=><div key={c.uid} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:1}}>
            <CardView card={c} size="xs" onClick={()=>isMyTurn&&setSelCard(c)}/><EnergyDots energies={c.energies} max={4}/><StatusBadge status={c.status}/><div style={{width:52}}><HpBar pokemon={c} compact/></div>
          </div>)}
        </div>
      </div>
      {myActive&&<AttackPanel pokemon={myActive} label={`${myLabel}: ${myActive.name}`}/>}
    </div>

    {/* Actions */}
    {isMyTurn&&!winner&&<div style={{display:"flex",flexDirection:"column",gap:5}}>
      {myActive?.attacks?.map((atk,i)=>{
        const able=!attacked&&!firstTurn&&canUseAttack(myActive,i);
        const info=parseAtkText(atk.text||"");
        return<button key={i} onClick={()=>handleAttack(i)} style={{width:"100%",padding:"9px 12px",borderRadius:13,fontWeight:900,fontSize:12,border:"none",cursor:able?"pointer":"not-allowed",background:able?"linear-gradient(135deg,#DC2626,#9F1239)":"rgba(255,255,255,0.05)",color:able?"#fff":"rgba(255,255,255,0.18)",boxShadow:able?"0 4px 18px rgba(220,38,38,0.35)":"none",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <span>{info.needsCoin?"🪙 ":"⚔️ "}{atk.name}{firstTurn?" (first turn)":""}</span>
          <div style={{display:"flex",alignItems:"center",gap:5}}>
            <span style={{display:"flex",gap:2}}>{(atk.cost||[]).map((c,ci)=><span key={ci} style={{background:TC[c]||"#94A3B8",color:"#fff",fontSize:8,padding:"1px 4px",borderRadius:99,fontWeight:700}}>{TE[c]||c[0]}</span>)}</span>
            <span style={{color:able?"#FBBF24":"rgba(255,255,255,0.18)",fontWeight:900,fontSize:14}}>{atk.damage||"—"}</span>
          </div>
        </button>;
      })}
      <div style={{display:"flex",gap:6}}>
        <button onClick={()=>canRetreat&&setRetreatPicking(true)} style={{flex:1,padding:"7px",borderRadius:11,fontWeight:700,fontSize:11,border:"none",cursor:canRetreat?"pointer":"not-allowed",...retireBtnStyle}}>🔄 Retreat{myActive?.retreatCost?` (⚡${myActive.retreatCost})`:""}</button>
        <button onClick={()=>dispatch({type:"endTurn",myKey,theirKey})} style={{flex:1,padding:"7px",borderRadius:11,fontWeight:700,fontSize:11,border:"none",cursor:"pointer",background:attacked?"linear-gradient(135deg,#16A34A,#15803D)":"rgba(255,255,255,0.07)",color:attacked?"#fff":"rgba(255,255,255,0.35)"}}>{attacked?"✓ End Turn":"Pass Turn"}</button>
      </div>
    </div>}

    {/* Hand */}
    <div style={{borderTop:"1px solid rgba(255,255,255,0.07)",paddingTop:5}}>
      <p style={{color:"rgba(255,255,255,0.3)",fontSize:9,margin:"0 0 5px",fontWeight:700,textTransform:"uppercase",letterSpacing:0.8}}>Hand — Tap a card to play it</p>
      <div style={{overflowX:"auto"}}><div style={{display:"flex",gap:6,padding:"2px"}}>
        {mySide.hand.length===0?<p style={{color:"rgba(255,255,255,0.2)",fontSize:11,padding:"12px 0"}}>Hand empty</p>:mySide.hand.map(card=>{
          const isEvoCard=card.supertype==="Pokémon"&&EVO_FROM[card.name];
          const canEvo=isEvoCard&&(myActive?.name===EVO_FROM[card.name]||mySide.bench.some(b=>b.name===EVO_FROM[card.name]));
          return<div key={card.uid} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,flexShrink:0}}>
            <CardView card={card} size="sm" onClick={()=>handleCardTap(card)} glowing={canEvo}/>
            <p style={{color:"rgba(255,255,255,0.3)",fontSize:8,margin:0,width:80,textAlign:"center",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{card.name}</p>
          </div>;
        })}
      </div></div>
    </div>
  </div>;
}

// ─── DECK BUILDER SCREEN ───────────────────────────────────────────────────
function DeckBuilderScreen({collection,decks,onSaveDeck,onClose}){
  const [deckName,setDeckName]=useState("My Deck");
  const [selected,setSelected]=useState([]);
  const [tab,setTab]=useState("Pokémon");
  const [savedMsg,setSavedMsg]=useState("");

  const pokes=collection.filter(c=>c.supertype==="Pokémon");
  const trainers=collection.filter(c=>c.supertype==="Trainer");
  const pool=tab==="Pokémon"?pokes:trainers;

  const selCount=type=>selected.filter(c=>c.supertype===type).length;
  const selTotal=selected.length;
  const maxEnergy=DECK_ENERGY+(DECK_POKE-selCount("Pokémon"))+(DECK_TRAINER-selCount("Trainer"));
  const deckPreview=useMemo(()=>{
    const typeCounts={};selected.filter(c=>c.supertype==="Pokémon").forEach(p=>(p.types||["Colorless"]).forEach(t=>{typeCounts[t]=(typeCounts[t]||0)+1}));
    const sorted=Object.entries(typeCounts).sort((a,b)=>b[1]-a[1]);
    const t1=sorted[0]?.[0]||"Colorless",t2=sorted[1]?.[0]||t1;
    const eNeeded=Math.max(0,DECK_ENERGY+(DECK_POKE+DECK_TRAINER-selTotal));
    const e1=Math.ceil(eNeeded*.7),e2=Math.max(0,eNeeded-e1);
    return{t1,t2,e1,e2,total:selTotal+eNeeded};
  },[selected]);

  const toggleCard=card=>{
    const has=selected.some(c=>c.uid===card.uid);
    if(has){setSelected(p=>p.filter(c=>c.uid!==card.uid));return}
    if(card.supertype==="Pokémon"&&selCount("Pokémon")>=DECK_POKE)return;
    if(card.supertype==="Trainer"&&selCount("Trainer")>=DECK_TRAINER)return;
    setSelected(p=>[...p,card]);
  };

  const handleAutoFill=()=>{
    const ap=shuffle(pokes).slice(0,DECK_POKE).map(p=>({...p}));
    const at=shuffle(trainers).slice(0,DECK_TRAINER).map(t=>({...t}));
    setSelected([...ap,...at]);
  };

  const handleSave=()=>{
    if(selCount("Pokémon")===0){setSavedMsg("Need at least 1 Pokémon!");return}
    const tc={};selected.filter(c=>c.supertype==="Pokémon").forEach(p=>(p.types||["Colorless"]).forEach(t=>{tc[t]=(tc[t]||0)+1}));
    const sorted=Object.entries(tc).sort((a,b)=>b[1]-a[1]);
    const t1=sorted[0]?.[0]||"Colorless",t2=sorted[1]?.[0]||t1;
    const eNeeded=Math.max(0,DECK_POKE+DECK_TRAINER+DECK_ENERGY-selTotal);
    const e1=Math.ceil(eNeeded*.7),e2=Math.max(0,eNeeded-e1);
    const deck=shuffle([...selected.map(c=>({...c,uid:uid()})),...Array.from({length:e1},()=>makeEnergy(t1)),...Array.from({length:e2},()=>makeEnergy(t2))]);
    const newDeck={id:uid(),name:deckName||"My Deck",cards:deck,createdAt:Date.now()};
    onSaveDeck(newDeck);setSavedMsg(`"${newDeck.name}" saved! (${deck.length} cards)`);setTimeout(()=>setSavedMsg(""),3000);
  };

  return<div style={{display:"flex",flexDirection:"column",height:"100%"}}>
    <div style={{padding:"10px 16px 8px",flexShrink:0}}>
      <div style={{display:"flex",gap:8,marginBottom:8}}>
        <input value={deckName} onChange={e=>setDeckName(e.target.value)} placeholder="Deck name..." style={{flex:1,background:"rgba(255,255,255,0.07)",color:"#fff",border:"1px solid rgba(255,255,255,0.12)",borderRadius:11,padding:"7px 12px",fontSize:13,outline:"none"}}/>
        <button onClick={handleAutoFill} style={{padding:"7px 12px",borderRadius:11,background:"linear-gradient(135deg,#38BDF8,#1D4ED8)",color:"#fff",fontWeight:700,fontSize:11,border:"none",cursor:"pointer",flexShrink:0}}>Auto</button>
      </div>
      <div style={{background:"rgba(255,255,255,0.05)",borderRadius:12,padding:"8px 12px",marginBottom:8,border:"1px solid rgba(255,255,255,0.08)"}}>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"rgba(255,255,255,0.5)",marginBottom:3}}>
          <span>Pokémon: {selCount("Pokémon")}/{DECK_POKE}</span>
          <span>Trainers: {selCount("Trainer")}/{DECK_TRAINER}</span>
          <span>Energy: {deckPreview.e1+deckPreview.e2} (auto)</span>
        </div>
        <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
          {deckPreview.e1>0&&<span style={{background:TC[deckPreview.t1]||"#94A3B8",color:"#fff",fontSize:9,fontWeight:700,padding:"2px 7px",borderRadius:99}}>{TE[deckPreview.t1]} ×{deckPreview.e1}</span>}
          {deckPreview.e2>0&&deckPreview.t2!==deckPreview.t1&&<span style={{background:TC[deckPreview.t2]||"#94A3B8",color:"#fff",fontSize:9,fontWeight:700,padding:"2px 7px",borderRadius:99}}>{TE[deckPreview.t2]} ×{deckPreview.e2}</span>}
          <span style={{color:"rgba(255,255,255,0.4)",fontSize:10,marginLeft:"auto"}}>Total: {deckPreview.total} cards</span>
        </div>
      </div>
      <div style={{display:"flex",gap:7,marginBottom:8}}>
        {["Pokémon","Trainer"].map(t=><button key={t} onClick={()=>setTab(t)} style={{flex:1,padding:"6px",borderRadius:10,fontSize:12,fontWeight:700,border:"none",cursor:"pointer",background:tab===t?"linear-gradient(135deg,#A78BFA,#4338CA)":"rgba(255,255,255,0.07)",color:tab===t?"#fff":"rgba(255,255,255,0.5)"}}>{t}s ({(tab===t?pool:t==="Pokémon"?pokes:trainers).length})</button>)}
      </div>
    </div>
    <div style={{flex:1,overflowY:"auto",padding:"0 16px 8px"}}>
      {pool.length===0?<div style={{textAlign:"center",padding:"30px 0",color:"rgba(255,255,255,0.3)",fontSize:13}}>No {tab} cards yet — open packs!</div>:
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
        {pool.map(card=>{const isSel=selected.some(c=>c.uid===card.uid);return<div key={card.uid} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
          <CardView card={card} size="md" selected={isSel} onClick={()=>toggleCard(card)}/>
          <p style={{color:"rgba(255,255,255,0.45)",fontSize:9,textAlign:"center",margin:0,width:"100%",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{card.name}</p>
        </div>;})}
      </div>}
    </div>
    <div style={{padding:"8px 16px 12px",flexShrink:0,borderTop:"1px solid rgba(255,255,255,0.07)"}}>
      {savedMsg&&<p style={{color:"#4ADE80",fontSize:12,textAlign:"center",margin:"0 0 6px"}}>{savedMsg}</p>}
      <div style={{display:"flex",gap:8}}>
        <button onClick={handleSave} style={{flex:1,padding:"11px",borderRadius:13,background:"linear-gradient(135deg,#FFD700,#FF8C00)",color:"#000",fontWeight:900,fontSize:14,border:"none",cursor:"pointer",fontFamily:"'Fredoka One',cursive"}}>💾 Save Deck</button>
        <button onClick={onClose} style={{flex:1,padding:"11px",borderRadius:13,background:"rgba(255,255,255,0.07)",color:"rgba(255,255,255,0.55)",fontWeight:700,fontSize:14,border:"1px solid rgba(255,255,255,0.1)",cursor:"pointer"}}>Cancel</button>
      </div>
    </div>
  </div>;
}

// ─── SCREENS ───────────────────────────────────────────────────────────────
function HomeScreen({coins,collection,wins,totalXp,onDaily,dailyAvailable,navigate,questStats,claimedQuests}){

  const claimable=QUESTS.filter(q=>((questStats[q.stat]||0)>=q.target)&&!claimedQuests.includes(q.id)).length;
  return<div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:18,padding:"20px 16px"}}>
    <div style={{textAlign:"center"}}>
      <h1 style={{fontFamily:"'Fredoka One',cursive",fontSize:50,color:"#FFD700",textShadow:"4px 4px 0 #CC0000,2px 2px 0 #FF6B35",margin:0,lineHeight:1}}>PokéCards!</h1>
      <p style={{color:"rgba(255,255,255,0.4)",fontSize:12,margin:"4px 0 0"}}>Collect · Battle · Evolve</p>
    </div>
    {/* Level bar */}
    <div style={{width:"100%",maxWidth:340,background:"rgba(255,255,255,0.05)",borderRadius:16,padding:"10px 14px",border:"1px solid rgba(255,255,255,0.07)"}}>

  const [loading,setLoading]=useState(true);
  const [packAnim,setPackAnim]=useState(false);
  const [newCards,setNewCards]=useState([]);
  const [battle,setBattle]=useState(null);
  const [questStats,setQuestStats]=useState({botWins:0,kos:0,damage:0,evos:0,cards:0,packs:0,dailies:0});
  const [claimedQuests,setClaimedQuests]=useState([]);
  const [decks,setDecks]=useState([]);
  const [showDeckBuilder,setShowDeckBuilder]=useState(false);

  // Stable refs to avoid stale closures in async
  const ref=useRef({coins:S_COINS,collection:[],wins:0,xp:0,tokens:0,questStats:{botWins:0,kos:0,damage:0,evos:0,cards:0,packs:0,dailies:0},winHandled:false});
  const syncRef=(key,val)=>{ref.current[key]=val};

  useEffect(()=>syncRef("coins",coins),[coins]);
  useEffect(()=>syncRef("collection",collection),[collection]);
  useEffect(()=>syncRef("wins",wins),[wins]);
  useEffect(()=>syncRef("xp",totalXp),[totalXp]);
  useEffect(()=>syncRef("tokens",tradeTokens),[tradeTokens]);
  useEffect(()=>syncRef("questStats",questStats),[questStats]);

  // ── Load all state on mount ──
  useEffect(()=>{
    async function init(){
      const[c,col,w,xp,tok,ld,st,qs,cq,dk]=await Promise.all([
        load("pc6_coins",S_COINS),load("pc6_collection",[]),load("pc6_wins",0),
        load("pc6_xp",0),load("pc6_tokens",0),load("pc6_daily",null),
        load("pc6_starters",null),
        load("pc6_questStats",{botWins:0,kos:0,damage:0,evos:0,cards:0,packs:0,dailies:0}),
        load("pc6_claimed",[]),load("pc6_decks",[]),
      ]);
      const withUid=col.map(x=>({...x,uid:x.uid||uid()}));
      setCoins(c);setCollection(withUid);setWins(w);setTotalXp(xp);setTradeTokens(tok);
      setLastDaily(ld);setQuestStats(qs||{botWins:0,kos:0,damage:0,evos:0,cards:0,packs:0,dailies:0});
      setClaimedQuests(cq||[]);setDecks(dk||[]);
      syncRef("coins",c);syncRef("collection",withUid);syncRef("wins",w);syncRef("xp",xp);syncRef("tokens",tok);syncRef("questStats",qs||{});

      if(st?.length>0){setStarterPool(st);setLoading(false);return}
      try{
        const res=await fetch(`${API}/cards?q=supertype:Pok%C3%A9mon%20subtypes:Basic&pageSize=60&orderBy=name`);
        const data=await res.json();
        const cards=(data.data||[]).filter(c=>(c.attacks?.length||0)>0&&c.images?.small).map(normalizeApiCard);
        const pool=cards.length>0?cards:FBP.map(p=>({...p,uid:uid()}));
        setStarterPool(pool);await save("pc6_starters",pool);
      }catch{setStarterPool(FBP.map(p=>({...p,uid:uid()})))}
      setLoading(false);
    }
    init();
  },[]);

  const isDailyAvailable=!lastDaily||(Date.now()-new Date(lastDaily).getTime()>86400000);

  // ── Save helper: commits state refs to storage ──
  const persist=useCallback(async(overrides={})=>{
    const r={...ref.current,...overrides};
    await Promise.all([
      save("pc6_coins",r.coins),save("pc6_collection",r.collection),
      save("pc6_wins",r.wins),save("pc6_xp",r.xp),save("pc6_tokens",r.tokens),
      save("pc6_questStats",r.questStats),
    ]);
  },[]);

  const addXp=useCallback((amount)=>{
    const nx=ref.current.xp+amount;
    setTotalXp(nx);syncRef("xp",nx);
    return nx;
  },[]);

  const addCoins=useCallback((amount)=>{
    const nc=ref.current.coins+amount;
    setCoins(nc);syncRef("coins",nc);
    return nc;
  },[]);

  const updateQuestStats=useCallback((updates)=>{
    const nqs={...ref.current.questStats,...updates};
    setQuestStats(nqs);syncRef("questStats",nqs);
    return nqs;
  },[]);

  const handleDaily=useCallback(async()=>{
    const now=new Date().toISOString();
    addCoins(DAILY_COINS);addXp(DAILY_XP);
    const nqs=updateQuestStats({dailies:(ref.current.questStats.dailies||0)+1});
    setLastDaily(now);
    await Promise.all([save("pc6_daily",now),persist({questStats:nqs})]);
  },[]);

  const handleBuyPack=useCallback(async(pack)=>{
    if(!pack){setPackAnim(false);setNewCards([]);return}
    if(ref.current.coins<pack.cost)return;
    let cards=[];
    try{
      const res=await fetch(`${API}/cards?q=${encodeURIComponent(pack.query)}&pageSize=20&page=${1+Math.floor(Math.random()*6)}`);
      const data=await res.json();
      const pool=(data.data||[]).filter(c=>c.images?.small).map(normalizeApiCard);
      cards=shuffle(pool).slice(0,pack.count||5);
    }catch{}
    while(cards.length<(pack.count||5))cards.push({...FBP[Math.floor(Math.random()*FBP.length)],uid:uid()});
    // Add trainers
    const trainerCards=pack.trainers>0?shuffle(TRAINER_POOL).slice(0,pack.trainers).map(t=>({...t,uid:uid()})):[];
    const allNew=[...cards,...trainerCards];
    // Calculate trade tokens from dupes
    const idCount={};ref.current.collection.forEach(c=>{idCount[c.id]=(idCount[c.id]||0)+1});
    const newTokens=allNew.filter(c=>c.supertype==="Pokémon"&&(idCount[c.id]||0)>=2).length;
    const nc=ref.current.collection.concat(allNew);
    const ncoins=ref.current.coins-pack.cost;
    const ntok=ref.current.tokens+newTokens;
    setCollection(nc);syncRef("collection",nc);
    setCoins(ncoins);syncRef("coins",ncoins);
    setTradeTokens(ntok);syncRef("tokens",ntok);
    setNewCards(allNew);setPackAnim(true);
    addXp(PACK_XP);
    const nqs=updateQuestStats({cards:nc.filter(c=>c.supertype==="Pokémon").length,packs:(ref.current.questStats.packs||0)+1});
    await persist({collection:nc,questStats:nqs});
  },[]);

  const handleStartBattle=useCallback((mode,deckObj)=>{
    ref.current.winHandled=false;
    const myPokes=ref.current.collection.filter(c=>c.supertype==="Pokémon");
    const playerDeck=deckObj?.cards?shuffle(deckObj.cards.map(c=>({...c,uid:uid()}))):
      myPokes.length>=2?autoBuildDeck(ref.current.collection):
      FBP.slice(0,6).map(p=>({...p,uid:uid()})).concat(Array.from({length:10},()=>makeEnergy("Colorless")));
    const botPool=shuffle([...FBP,...starterPool.filter(c=>c.supertype==="Pokémon")]).slice(0,16);
    const b=initBattle(playerDeck,botPool,mode);
    if(!b)return;
    setBattle(b);setScreen("game");
  },[starterPool]);

  const dispatch=useCallback(action=>{
    setBattle(prev=>{if(!prev||prev.winner)return prev;return battleReducer(prev,action)});
  },[]);

  // Bot turn effect
  useEffect(()=>{
    if(!battle||battle.turn!=="bot"||battle.winner||battle.mode!=="bot")return;
    const t=setTimeout(async()=>{
      const ns=botTurn(battle);
      setBattle(ns);
      if(ns.winner==="player"&&!ref.current.winHandled){
        ref.current.winHandled=true;
        const nw=ref.current.wins+1;
        setWins(nw);syncRef("wins",nw);
        addCoins(WIN_COINS);addXp(WIN_XP);
        const bs=ns.statsThisBattle||{};
        const nqs=updateQuestStats({
          botWins:(ref.current.questStats.botWins||0)+1,
          kos:(ref.current.questStats.kos||0)+(bs.kos||0),
          damage:(ref.current.questStats.damage||0)+(bs.damage||0),
          evos:(ref.current.questStats.evos||0)+(bs.evos||0),
        });
        await persist({wins:nw,questStats:nqs});
      } else if(ns.winner==="bot"&&!ref.current.winHandled){
        ref.current.winHandled=true;
        addXp(LOSS_XP);
        await persist();
      }
    },1400);
    return()=>clearTimeout(t);
  },[battle?.turn,battle?.winner]);

  const handleBattleEnd=useCallback(()=>{setBattle(null);setScreen("home")},[]);

  const handleClaimQuest=useCallback(async(quest)=>{
    addCoins(quest.reward);addXp(QUEST_XP);
    const ncq=[...claimedQuests,quest.id];
    setClaimedQuests(ncq);
    await Promise.all([save("pc6_claimed",ncq),persist()]);
  },[claimedQuests]);

  const handleSaveDeck=useCallback(async(deck)=>{
    const nd=[...decks,deck];setDecks(nd);await save("pc6_decks",nd);
  },[decks]);

  const handleReset=useCallback(async()=>{
    const keys=["pc6_coins","pc6_collection","pc6_wins","pc6_xp","pc6_tokens","pc6_daily","pc6_starters","pc6_questStats","pc6_claimed","pc6_decks"];
    await Promise.all(keys.map(k=>save(k,null)));
    window.location.reload();
  },[]);

  const claimable=QUESTS.filter(q=>((questStats[q.stat]||0)>=q.target)&&!claimedQuests.includes(q.id)).length;
  const NAV=[{id:"home",i:"🏠",l:"Home"},{id:"collection",i:"🃏",l:"Cards"},{id:"shop",i:"🛍️",l:"Shop"},{id:"battle",i:"⚔️",l:"Battle"},{id:"quests",i:"📋",l:"Quests"}];
  const TITLE={home:"⚡ PokéCards!",collection:"🃏 My Cards",shop:"🛍️ Shop",battle:"⚔️ Battle",quests:"📋 Quests",pokedex:"📖 Pokédex",settings:"⚙️ Settings"};

  if(loading)return<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(160deg,#0f0c29,#302b63,#24243e)"}}>
    <div style={{textAlign:"center"}}><div style={{fontSize:72,animation:"bounce 1s infinite"}}>⚡</div><p style={{fontFamily:"'Fredoka One',cursive",fontSize:26,color:"#FFD700",margin:"12px 0"}}>Loading PokéCards...</p></div>
  </div>;

  return<div style={{minHeight:"100vh",display:"flex",flexDirection:"column",maxWidth:440,margin:"0 auto",overflow:"hidden",background:"linear-gradient(160deg,#0f0c29 0%,#302b63 55%,#24243e 100%)"}}>
    {/* Deck Builder overlay */}
    {showDeckBuilder&&<div style={{position:"fixed",inset:0,zIndex:300,background:"linear-gradient(160deg,#0f0c29 0%,#302b63 55%,#24243e 100%)",display:"flex",flexDirection:"column"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"11px 16px",borderBottom:"1px solid rgba(255,255,255,0.07)",background:"rgba(0,0,0,0.3)",flexShrink:0}}>
        <span style={{fontFamily:"'Fredoka One',cursive",color:"#fff",fontSize:17}}>🃏 Deck Builder</span>
        <span style={{background:"linear-gradient(135deg,#FFD700,#FF8C00)",color:"#000",fontWeight:900,fontSize:12,padding:"3px 10px",borderRadius:99}}>🪙 {coins}</span>
      </div>
      <div style={{flex:1,overflowY:"auto"}}><DeckBuilderScreen collection={collection} decks={decks} onSaveDeck={handleSaveDeck} onClose={()=>setShowDeckBuilder(false)}/></div>
    </div>}

    {/* Header */}
    {screen!=="game"&&<div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 16px",borderBottom:"1px solid rgba(255,255,255,0.07)",background:"rgba(0,0,0,0.25)",backdropFilter:"blur(12px)",zIndex:10,flexShrink:0}}>
      {!["home"].includes(screen)?<button onClick={()=>setScreen("home")} style={{color:"rgba(255,255,255,0.4)",fontSize:13,fontWeight:700,background:"none",border:"none",cursor:"pointer"}}>← Back</button>:<div style={{width:52}}/>}
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <span style={{fontFamily:"'Fredoka One',cursive",color:"#fff",fontSize:16}}>{TITLE[screen]||"PokéCards"}</span>
      </div>
      <span style={{background:"linear-gradient(135deg,#FFD700,#FF8C00)",color:"#000",fontWeight:900,fontSize:12,padding:"3px 10px",borderRadius:99}}>🪙 {coins}</span>
    </div>}

    {/* Content */}
    <div style={{flex:1,overflowY:"auto",position:"relative",zIndex:5,display:screen==="game"?"flex":"block",flexDirection:"column"}}>
      {screen==="home"&&<HomeScreen coins={coins} collection={collection} wins={wins} totalXp={totalXp} onDaily={handleDaily} dailyAvailable={isDailyAvailable} navigate={s=>{if(s==="battle"&&collection.filter(c=>c.supertype==="Pokémon").length>=2){}setScreen(s)}} questStats={questStats} claimedQuests={claimedQuests}/>}
      {screen==="collection"&&<div style={{display:"flex",flexDirection:"column",height:"100%"}}>
        <div style={{padding:"8px 16px",flexShrink:0}}><button onClick={()=>setShowDeckBuilder(true)} style={{width:"100%",padding:"10px",borderRadius:13,background:"linear-gradient(135deg,#A78BFA,#4338CA)",color:"#fff",fontWeight:800,fontSize:13,border:"none",cursor:"pointer"}}>🃏 Build / Edit Decks ({decks.length} saved)</button></div>
        <div style={{flex:1,overflow:"hidden"}}><CollectionScreen collection={collection}/></div>
      </div>}
      {screen==="shop"&&<ShopScreen coins={coins} onBuyPack={handleBuyPack} packAnim={packAnim} newCards={newCards}/>}
      {screen==="battle"&&<BattleSelect collection={collection} decks={decks} onStart={handleStartBattle}/>}
      {screen==="quests"&&<QuestScreen questStats={questStats} claimedQuests={claimedQuests} onClaim={handleClaimQuest}/>}
      {screen==="pokedex"&&<PokedexScreen collection={collection}/>}
      {screen==="settings"&&<SettingsScreen totalXp={totalXp} coins={coins} collection={collection} wins={wins} onReset={handleReset} tradeTokens={tradeTokens}/>}
      {screen==="game"&&battle&&<div style={{display:"flex",flexDirection:"column",flex:1}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"7px 12px",background:"rgba(0,0,0,0.45)",borderBottom:"1px solid rgba(255,255,255,0.07)",flexShrink:0,zIndex:10}}>
          <button onClick={handleBattleEnd} style={{color:"rgba(255,255,255,0.3)",fontSize:12,background:"none",border:"none",cursor:"pointer"}}>✕ Forfeit</button>
          <span style={{fontFamily:"'Fredoka One',cursive",color:"#fff",fontSize:14}}>⚔️ {battle.mode==="passplay"?"Pass & Play":"vs Bot"}</span>
          <span style={{fontSize:11,color:"rgba(255,255,255,0.4)"}}>{battle.winner?"🎮 Over":battle.turn==="player"?"👤 Your turn":"🤖 Bot..."}</span>
        </div>
        <div style={{flex:1,overflowY:"auto",padding:7}}><BattleGame state={battle} dispatch={dispatch} onEnd={handleBattleEnd}/></div>
      </div>}
    </div>

    {/* Nav */}
    {screen!=="game"&&<div style={{display:"flex",borderTop:"1px solid rgba(255,255,255,0.07)",background:"rgba(0,0,0,0.35)",backdropFilter:"blur(12px)",zIndex:10,flexShrink:0}}>
      {NAV.map(n=><button key={n.id} onClick={()=>setScreen(n.id)} style={{flex:1,padding:"9px 4px",display:"flex",flexDirection:"column",alignItems:"center",gap:1,background:"none",border:"none",cursor:"pointer",color:screen===n.id?"#FFD700":"rgba(255,255,255,0.3)",position:"relative"}}>
        <span style={{fontSize:18}}>{n.i}</span>
        <span style={{fontSize:9,fontWeight:700}}>{n.l}</span>
        {n.id==="quests"&&claimable>0&&<span style={{position:"absolute",top:5,right:6,width:8,height:8,borderRadius:"50%",background:"#EF4444",boxShadow:"0 0 6px rgba(239,68,68,0.7)"}}/>}
      </button>)}
    </div>}
  </div>;
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
</body>
</html>
