*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;width:100%;font-family:'Nunito',sans-serif;background:#0f0c29;overscroll-behavior:none}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:99px}
@keyframes bounceIn{0%{transform:scale(0) rotate(-12deg);opacity:0}60%{transform:scale(1.15) rotate(4deg)}100%{transform:scale(1) rotate(0);opacity:1}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slideUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
@keyframes shimmer{0%{background-position:200% center}100%{background-position:-200% center}}
.fc{perspective:900px}
.fci{transition:transform .6s;transform-style:preserve-3d;position:relative;cursor:pointer}
.fci.flipped{transform:rotateY(180deg)}
.ff,.fb{backface-visibility:hidden;-webkit-backface-visibility:hidden;position:absolute;top:0;left:0;width:100%;height:100%}
.fb{transform:rotateY(180deg)}
</style>

window.storage={
  get:async k=>{try{if(window.AndroidStorage){const v=window.AndroidStorage.get(k);return v?{key:k,value:v}:null}}catch(e){}const v=localStorage.getItem(k);return v?{key:k,value:v}:null},
  set:async(k,v)=>{try{if(window.AndroidStorage){window.AndroidStorage.set(k,v);return}}catch(e){}localStorage.setItem(k,v)},
};
async function load(k,d){try{const r=await window.storage.get(k);return r?JSON.parse(r.value):d}catch{return d}}
async function save(k,v){try{await window.storage.set(k,JSON.stringify(v))}catch{}}

  ctx:null,vol:0.25,on:true,
  gc(){if(!this.ctx)try{this.ctx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}return this.ctx},
  play(f,d=0.1,t='sine',v){
    if(!this.on)return;const c=this.gc();if(!c)return;
    try{const o=c.createOscillator(),g=c.createGain();o.type=t;o.frequency.value=f;g.gain.value=(v??this.vol)*0.28;o.connect(g);g.connect(c.destination);o.start();g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+d);o.stop(c.currentTime+d);}catch(e){}
  },
  atk(){this.play(260,.08,'sawtooth');setTimeout(()=>this.play(190,.12,'sawtooth'),70)},
  ko(){this.play(120,.55,'sawtooth')},
  prize(){this.play(520,.07);setTimeout(()=>this.play(660,.1),110);setTimeout(()=>this.play(790,.18),230)},
  flip(){this.play(440,.06)},
  card(){this.play(680,.06,'triangle')},
  err(){this.play(190,.18,'square')},

const INIT_STATE={
  coins:S_COINS,collection:[],wins:0,totalXp:0,tradeTokens:0,
  lastDaily:null,questStats:{botWins:0,kos:0,damage:0,evos:0,cards:0,packs:0,dailies:0},
  claimedQuests:[],decks:[],soundEnabled:true,soundVolume:0.25,
};

function appReducer(s,a){
  switch(a.type){
    case'INIT':return{...INIT_STATE,...a.payload};
    case'DAILY':{
      const nqs={...s.questStats,dailies:(s.questStats.dailies||0)+1};
      return{...s,coins:s.coins+DAILY_COINS,totalXp:s.totalXp+DAILY_XP,lastDaily:new Date().toISOString(),questStats:nqs};
    }
    case'BUY_PACK':{
      if(s.coins<a.cost)return s; // guard negative
      const idCnt={};s.collection.forEach(c=>{idCnt[c.id]=(idCnt[c.id]||0)+1});
      const newTokens=a.cards.filter(c=>c.supertype==="Pokémon"&&(idCnt[c.id]||0)>=2).length;
      const nc=[...s.collection,...a.cards];
      const nqs={...s.questStats,cards:nc.filter(c=>c.supertype==="Pokémon").length,packs:(s.questStats.packs||0)+1};
      return{...s,coins:s.coins-a.cost,collection:nc,totalXp:s.totalXp+PACK_XP,tradeTokens:s.tradeTokens+newTokens,questStats:nqs};
    }
    case'WIN_BATTLE':{
      const nqs={...s.questStats,botWins:(s.questStats.botWins||0)+1,kos:(s.questStats.kos||0)+(a.kos||0),damage:(s.questStats.damage||0)+(a.damage||0),evos:(s.questStats.evos||0)+(a.evos||0)};
      return{...s,wins:s.wins+1,coins:s.coins+WIN_COINS,totalXp:s.totalXp+WIN_XP,questStats:nqs};
    }
    case'LOSS_BATTLE':{
      const nqs={...s.questStats,kos:(s.questStats.kos||0)+(a.kos||0),damage:(s.questStats.damage||0)+(a.damage||0),evos:(s.questStats.evos||0)+(a.evos||0)};
      return{...s,totalXp:s.totalXp+LOSS_XP,questStats:nqs};
    }
    case'CLAIM_QUEST':{
      if(s.claimedQuests.includes(a.questId))return s; // IDEMPOTENT - prevents double claim
      return{...s,claimedQuests:[...s.claimedQuests,a.questId],coins:s.coins+a.reward,totalXp:s.totalXp+(a.xp||QUEST_XP)};
    }
    case'SAVE_DECK':return{...s,decks:[...s.decks,a.deck]};
    case'DELETE_DECK':return{...s,decks:s.decks.filter(d=>d.id!==a.deckId)};
    case'SET_SOUND':return{...s,soundEnabled:a.enabled??s.soundEnabled,soundVolume:a.volume??s.soundVolume};
    case'RESET':return{...INIT_STATE};
    default:return s;
  }
}

// ═══════ TCG ENGINE ═══════
function canUseAttack(poke,idx=0){
  const atk=poke?.attacks?.[idx];if(!atk)return false;
  const cost=atk.cost||[];if(!cost.length)return true;
  const avail=clone(poke.energies||{});let colorless=0;
  for(const c of cost){if(c==="Colorless"){colorless++;continue}if((avail[c]||0)>0)avail[c]--;else return false}
  return Object.values(avail).reduce((a,b)=>a+b,0)>=colorless;
}

// ★ Energy consumption after attack
function consumeAtkEnergy(poke,atkCost){
  const en=clone(poke.energies||{});let colorless=0;
  for(const c of(atkCost||[])){
    if(c==="Colorless"){colorless++;continue}
    if((en[c]||0)>0)en[c]--;
  }
  for(const t of Object.keys(en)){
    while(en[t]>0&&colorless>0){en[t]--;colorless--}
    if(!en[t])delete en[t];
  }
  return en;
}

function calcDamage(base,attacker,defender,ignore){
  if(base<=0||ignore)return base;
  const at=attacker.types?.[0];let d=base;
  const wk=defender.weaknesses||[];
  if(wk.some(w=>w.type===at)||(WEAK_CHART[at]&&defender.types?.some(t=>t===WEAK_CHART[at])))d*=2;
  if((defender.resistances||[]).some(r=>r.type===at))d=Math.max(0,d-30);
  return d;
}

function parseAtkText(text=""){
  const t=text.toLowerCase();
  const status=/paralyz/i.test(t)?"Paralyzed":/asleep|sleep/i.test(t)?"Asleep":/poison/i.test(t)?"Poisoned":/confus/i.test(t)?"Confused":null;
  const needsCoin=/flip a coin/i.test(t);
  const extraHeads=(text.match(/if heads[^.]*?(\d+) more damage/i)||[])[1];
  const selfTails=(text.match(/if tails[^.]*?(\d+) damage to itself/i)||[])[1];
  const healSelf=t.includes("heal")&&t.includes("this pokémon")?(text.match(/heal (\d+)/i)||[])[1]:null;
  const ignore=/not affected by weakness or resistance/i.test(t);
  const getDiscard=()=>{
    const m=text.match(/discard (?:(\d+)|a|an) (\w+) energy/i);
    if(m){const cnt=m[1]?parseInt(m[1]):1;const tp=m[2];if(tp&&!/^(an?|this)$/i.test(tp))return{type:tp.charAt(0).toUpperCase()+tp.slice(1).toLowerCase(),count:cnt}}
    if(/discard an? energy/i.test(t))return{type:"any",count:1};
    return null;
  };
  return{status,needsCoin,extraHeads:extraHeads?parseInt(extraHeads):0,selfTails:selfTails?parseInt(selfTails):0,healSelf:healSelf?parseInt(healSelf):0,ignore,discard:getDiscard()};
}

function applyStatusTick(side,log){
  const s=clone(side);if(!s.active)return{side:s,log};
  const logs=[...log];const st=s.active.status;
  if(st==="Poisoned"){s.active.damage=(s.active.damage||0)+10;logs.push(`☠️ ${s.active.name} took 10 poison damage!`)}
  if(st==="Asleep"){if(Math.random()<0.5){s.active.status=null;logs.push(`💤 ${s.active.name} woke up!`)}else logs.push(`💤 ${s.active.name} is still asleep.`)}
  if(st==="Paralyzed"){s.active.status=null;logs.push(`⚡ ${s.active.name}'s paralysis wore off.`)}
  if(s.active.damage>=(s.active.hp||60)){
    logs.push(`💀 ${s.active.name} KO'd by status!`);
    s.discard.push(s.active);s.active=null;
    if(s.bench.length>0){s.active={...s.bench.splice(0,1)[0],damage:0,status:null};logs.push(`⬆️ ${s.active.name} promoted!`)}
  }
  return{side:s,log:logs};
}

function doAttack(state,atkKey,defKey,atkIdx,coinResult){
  let s=clone(state);
  const att=s[atkKey].active,def=s[defKey].active;
  if(!att||!def)return s;
  const atk=att.attacks?.[atkIdx];if(!atk)return s;
  const info=parseAtkText(atk.text||"");const log=[];

  // Status blocks
  if(att.status==="Paralyzed"){att.status=null;s[atkKey].active=att;s.log=[`🔒 ${att.name} was Paralyzed — can't attack! (status cleared)`,...s.log];return s}
  if(att.status==="Asleep"){s.log=[`💤 ${att.name} is Asleep — can't attack!`,...s.log];return s}
  if(att.status==="Confused"&&coinResult===false){const sd=30;att.damage=(att.damage||0)+sd;s[atkKey].active=att;s.log=[`😵 Confusion! ${att.name} hurt itself for ${sd}!`,...s.log];return s}

  let baseDmg=atk.damage||0;
  if(info.needsCoin){
    if(coinResult===true)baseDmg+=info.extraHeads;
    else if(coinResult===false&&info.selfTails>0)att.damage=(att.damage||0)+info.selfTails;
  }

  const finalDmg=calcDamage(baseDmg,att,def,info.ignore);
  def.damage=(def.damage||0)+finalDmg;
  if(finalDmg!==baseDmg&&baseDmg>0)log.push(`💥 ${att.name} → ${atk.name}: ${finalDmg}dmg${finalDmg>baseDmg?" (weakness×2!)":" (resist)"}`);
  else log.push(`💥 ${att.name} → ${atk.name}: ${finalDmg}dmg`);

  if(info.healSelf>0){att.damage=Math.max(0,(att.damage||0)-info.healSelf);log.push(`💚 ${att.name} healed ${info.healSelf}!`)}
  const applySt=info.needsCoin?(coinResult===true?info.status:null):info.status;
  if(applySt&&def.status!==applySt){def.status=applySt;log.push(`🔔 ${def.name} is now ${applySt}!`)}

  // ★ Effect text energy discard (e.g. Ember "Discard 1 Fire Energy")
  if(info.discard){
    att.energies=att.energies||{};
    if(info.discard.type==="any"){for(const[t,c]of Object.entries(att.energies)){if(c>0){att.energies[t]=Math.max(0,c-1);log.push(`🗑️ 1 Energy discarded from ${att.name}`);break}}}
    else{att.energies[info.discard.type]=Math.max(0,(att.energies[info.discard.type]||0)-info.discard.count);log.push(`🗑️ ${info.discard.count} ${info.discard.type} Energy discarded`)}
  }

  // ★ Consume attack cost energy
  att.energies=consumeAtkEnergy(att,atk.cost||[]);

  s[atkKey].active=att;s[defKey].active=def;
  s.statsThisBattle={...(s.statsThisBattle||{}),damage:(s.statsThisBattle?.damage||0)+finalDmg};

  // KO checks
  function tryKO(dKey,aKey,poke){
    if((poke.damage||0)<(poke.hp||60))return;
    log.push(`💀 ${poke.name} KO'd!`);
    s[dKey].discard.push(poke);s[dKey].active=null;
    s.statsThisBattle.kos=(s.statsThisBattle?.kos||0)+1;
    // Take prize card
    if(s[aKey].prizes.length>0){const p=s[aKey].prizes.splice(0,1)[0];s[aKey].hand.push(p);log.push(`🏅 Prize taken! (${s[aKey].prizes.length} left)`)}
    if(s[aKey].prizes.length===0){s.winner=aKey;log.push(`🎉 ${aKey==="player"?"You win!":"Bot wins!"} All prizes taken!`)}
    else if(s[dKey].bench.length>0){s[dKey].active={...s[dKey].bench.splice(0,1)[0],damage:0,status:null};log.push(`⬆️ ${s[dKey].active.name} promoted!`)}
    else{s.winner=aKey;log.push(`🎉 No Pokémon left — ${aKey==="player"?"You win!":"Bot wins!"}`)}
  }
  tryKO(defKey,atkKey,def);
  if(!s.winner&&(att.damage||0)>=(att.hp||60))tryKO(atkKey,defKey,att);

  s.log=[...log,...s.log];return s;
}

function doRetreat(state,myKey,benchIdx){
  let s=clone(state);const side=s[myKey];
  if(!side.active||benchIdx<0||benchIdx>=side.bench.length||side.retreated)return s;
  const cost=side.active.retreatCost||0;
  if(sumEnergy(side.active)<cost){s.log=[`❌ Need ${cost} energy to retreat (have ${sumEnergy(side.active)})`,...s.log];return s}
  let toDrop=cost;const en=clone(side.active.energies||{});
  for(const t of Object.keys(en)){while(en[t]>0&&toDrop>0){en[t]--;toDrop--}if(!en[t])delete en[t];if(!toDrop)break}
  const prom={...side.bench.splice(benchIdx,1)[0],status:null};
  side.bench.push({...side.active,energies:en,status:null});
  side.active=prom;side.retreated=true;
  s[myKey]=side;s.log=[`🔄 Retreated! ${prom.name} is now Active!`,...s.log];return s;
}

function doEvolve(state,myKey,evoCard,isActive,benchIdx){
  let s=clone(state);const side=s[myKey];
  const hi=side.hand.findIndex(c=>c.uid===evoCard.uid);if(hi<0)return s;
  side.hand.splice(hi,1);
  const tgt=isActive?side.active:side.bench[benchIdx];if(!tgt)return s;
  const ev={...evoCard,uid:tgt.uid,damage:tgt.damage,energies:tgt.energies,status:null};
  if(isActive)side.active=ev;else side.bench[benchIdx]=ev;
  s[myKey]=side;
  s.statsThisBattle={...(s.statsThisBattle||{}),evos:(s.statsThisBattle?.evos||0)+1};
  s.log=[`🌟 ${tgt.name} evolved into ${evoCard.name}!`,...s.log];return s;
}

function doTrainer(state,myKey,theirKey,card){
  let s=clone(state);const side=s[myKey];
  const hi=side.hand.findIndex(c=>c.uid===card.uid);if(hi<0)return s;
  side.hand.splice(hi,1);side.discard.push(card);
  const eff=card.effect||"";const log=[];
  if(eff==="heal30"&&side.active){side.active.damage=Math.max(0,(side.active.damage||0)-30);log.push(`💊 Potion! ${side.active.name} healed 30!`)}
  else if(eff==="healall"&&side.active){side.active.damage=0;side.active.energies={};log.push(`💊 Max Potion! ${side.active.name} fully healed!`)}
  else if(eff==="heal60discard"&&side.active){side.active.damage=Math.max(0,(side.active.damage||0)-60);const en=Object.keys(side.active.energies||{});if(en.length>0){side.active.energies[en[0]]=Math.max(0,(side.active.energies[en[0]]||1)-1);if(!side.active.energies[en[0]])delete side.active.energies[en[0]]}log.push(`💊 Super Potion! ${side.active.name} healed 60!`)}
  else if(eff==="fullheal"&&side.active){side.active.status=null;log.push(`✨ Full Heal! Status cleared from ${side.active.name}!`)}
  else if(eff==="switch"&&side.bench.length>0){const b=side.bench.splice(0,1)[0];side.bench.push({...side.active,status:null});side.active={...b,status:null};log.push(`🔄 Switch! ${b.name} is now Active!`)}
  else if(eff==="draw2"){const d=side.deck.splice(0,2);side.hand.push(...d);log.push(`🃏 Bill! Drew ${d.length} cards!`)}
  else if(eff==="draw6discard"){const h=[...side.hand];side.discard.push(...h);side.hand=[];const d=side.deck.splice(0,6);side.hand.push(...d);log.push(`📚 Research! Drew ${d.length} cards!`)}
  else if(eff==="marnie"){const ok=myKey==="player"?"bot":"player";const mh=[...side.hand],oh=[...s[ok].hand];side.deck=[...shuffle(mh),...side.deck];s[ok].deck=[...shuffle(oh),...s[ok].deck];side.hand=side.deck.splice(0,5);s[ok].hand=s[ok].deck.splice(0,4);log.push(`🔀 Marnie! You drew 5, opponent drew 4!`)}
  else if(eff==="energyretrieval"){const en=side.discard.filter(c=>c.supertype==="Energy").slice(0,2);side.discard=side.discard.filter(c=>!en.find(e=>e.uid===c.uid));side.hand.push(...en);log.push(`⚡ Retrieved ${en.length} Energy!`)}
  else if(eff==="nestball"){const pi=side.deck.findIndex(c=>c.supertype==="Pokémon"&&(c.subtypes?.includes("Basic")||!EVO_FROM[c.name]));if(pi>=0&&side.bench.length<MAX_BENCH){const p=side.deck.splice(pi,1)[0];side.bench.push({...p,damage:0,energies:{},status:null});log.push(`🔵 Poké Ball! ${p.name} on Bench!`)}}
  else log.push(`🃏 ${card.name} played!`);
  s[myKey]=side;s.log=[...log,...s.log];return s;
}

// ★ Deck building — ensures good Pokémon distribution
function autoBuildDeck(collection){
  const pokes=[...collection.filter(c=>c.supertype==="Pokémon")].sort((a,b)=>(b.hp||0)-(a.hp||0));
  const trainers=collection.filter(c=>c.supertype==="Trainer");
  const selP=pokes.slice(0,DECK_POKE).map(p=>({...p,uid:uid()}));
  const selT=shuffle(trainers).slice(0,DECK_TRAINER).map(t=>({...t,uid:uid()}));
  const typeCounts={};selP.forEach(p=>(p.types||["Colorless"]).forEach(t=>{typeCounts[t]=(typeCounts[t]||0)+1}));
  const sorted=Object.entries(typeCounts).sort((a,b)=>b[1]-a[1]);
  const t1=sorted[0]?.[0]||"Colorless",t2=sorted[1]?.[0]||t1;
  const eNeeded=Math.max(6,DECK_ENERGY+(DECK_POKE-selP.length)+(DECK_TRAINER-selT.length));
  const e1=Math.ceil(eNeeded*.7),e2=Math.max(0,eNeeded-e1);
  return shuffle([...selP,...selT,...Array.from({length:e1},()=>makeEnergy(t1)),...Array.from({length:e2},()=>makeEnergy(t2))]);
}

function buildBotDeck(pool){
  const pokes=shuffle(pool.filter(c=>c.supertype==="Pokémon")).slice(0,DECK_POKE).map(p=>({...p,uid:uid()}));
  const t1=pokes[0]?.types?.[0]||"Colorless",t2=pokes[1]?.types?.[0]||t1;
  const trainers=shuffle(TRAINER_POOL).slice(0,2).map(t=>({...t,uid:uid()}));
  const energies=[...Array.from({length:8},()=>makeEnergy(t1)),...Array.from({length:4},()=>makeEnergy(t2))];
  return shuffle([...pokes,...trainers,...energies]);
}

// ★ setupSide — mulligan-style: ensures Basic Pokémon in opening hand
function setupSide(deck){
  let d=shuffle([...deck]);
  // Find a Basic Pokémon for active slot
  const isBasic=c=>c.supertype==="Pokémon"&&(c.subtypes?.includes("Basic")||!EVO_FROM[c.name]);
  let pi=d.findIndex(isBasic);
  if(pi<0)pi=d.findIndex(c=>c.supertype==="Pokémon");
  if(pi<0)return null;
  const active={...d.splice(pi,1)[0],uid:uid(),damage:0,energies:{},status:null};
  // Mulligan up to 4 times to get Basic in hand
  let hand,prizes,rest;
  for(let attempt=0;attempt<4;attempt++){
    d=shuffle(d);
    hand=d.slice(0,HAND_SIZE);
    prizes=d.slice(HAND_SIZE,HAND_SIZE+PRIZE_COUNT);
    rest=d.slice(HAND_SIZE+PRIZE_COUNT);
    if(hand.some(isBasic)||attempt===3)break;
  }
  return{active,bench:[],hand:hand.map(c=>({...c,uid:uid()})),deck:rest.map(c=>({...c,uid:uid()})),prizes:prizes.map(c=>({...c,uid:uid()})),discard:[],retreated:false,supporterUsed:false};
}

function botTurn(state){
  let s=clone(state);
  if(!s.bot.deck.length){s.winner="player";s.log=["🎉 Bot ran out of cards! You win!",...s.log];return s}
  s.bot.hand.push({...s.bot.deck.shift(),uid:uid()});s.log=["🤖 Bot drew.",...s.log];
  const bt=s.bot.hand.find(c=>c.supertype==="Trainer");
  if(bt&&Math.random()<0.45)s=doTrainer(s,"bot","player",bt);
  const bp=s.bot.hand.filter(c=>c.supertype==="Pokémon"&&(c.subtypes?.includes("Basic")||!EVO_FROM[c.name]));
  if(bp.length&&s.bot.bench.length<MAX_BENCH){const p=bp[0];s.bot.hand=s.bot.hand.filter(c=>c.uid!==p.uid);s.bot.bench.push({...p,uid:uid(),damage:0,energies:{},status:null});s.log=[`🤖 Benched ${p.name}!`,...s.log]}
  if(s.bot.active){const ec=s.bot.hand.find(c=>c.supertype==="Pokémon"&&EVO_FROM[c.name]===s.bot.active.name);if(ec)s=doEvolve(s,"bot",ec,true,-1)}
  if(s.bot.active){
    const at=s.bot.active.types?.[0]||"Colorless";
    const me=s.bot.hand.find(e=>e.supertype==="Energy"&&e.types?.[0]===at)||s.bot.hand.find(e=>e.supertype==="Energy");
    if(me){s.bot.hand=s.bot.hand.filter(c=>c.uid!==me.uid);const et=me.types?.[0]||"Colorless";s.bot.active.energies=s.bot.active.energies||{};s.bot.active.energies[et]=(s.bot.active.energies[et]||0)+1;s.log=[`⚡ Bot powered ${s.bot.active.name}!`,...s.log]}
  }
  if(s.bot.active&&!s.winner){
    const ai=canUseAttack(s.bot.active,1)?1:canUseAttack(s.bot.active,0)?0:-1;
    if(ai>=0){const atk=s.bot.active.attacks[ai];const info=parseAtkText(atk.text||"");const coin=info.needsCoin?Math.random()<0.5:null;s=doAttack(s,"bot","player",ai,coin);}
    else s.log=[`🤖 ${s.bot.active.name} charging...`,...s.log];
  }
  if(!s.winner){
    const r1=applyStatusTick(s.player,s.log);s.player=r1.side;s.log=r1.log;
    const r2=applyStatusTick(s.bot,s.log);s.bot=r2.side;s.log=r2.log;
    if(!s.player.active&&!s.player.bench.length){s.winner="bot";s.log=["😢 No Pokémon left! Bot wins!",...s.log]}
    else if(!s.bot.active&&!s.bot.bench.length){s.winner="player";s.log=["🎉 Bot has no Pokémon! You win!",...s.log]}
    if(!s.winner){
      s.turn="player";s.energyUsed=false;s.attacked=false;s.bot.retreated=false;s.bot.supporterUsed=false;
      if(!s.player.deck.length){s.winner="bot";s.log=["😢 Deck empty! Bot wins!",...s.log]}
      else{s.player.hand.push({...s.player.deck.shift(),uid:uid()});s.log=["📤 You drew a card!",...s.log]}
    }
  }
  return s;
}

function initBattle(playerDeck,botPool,mode){
  const player=setupSide(playerDeck);
  const bot=setupSide(buildBotDeck(botPool));
  if(!player||!bot)return null;
  return{player,bot,turn:"player",energyUsed:false,attacked:false,
    log:["⚔️ Battle start! You cannot attack on your first turn. Take your time to set up!"],
    winner:null,mode,passplayTurn:"player1",passplayWaiting:false,
    statsThisBattle:{kos:0,damage:0,evos:0},firstTurn:true};
}

function battleReducer(s,a){
  if(!s||s.winner)return s;
  let st=clone(s);const{myKey,theirKey}=a;
  if(a.type==="attachEnergy"){
    if(st.energyUsed)return st;
    const ei=a.card?st[myKey].hand.findIndex(c=>c.uid===a.card.uid):st[myKey].hand.findIndex(c=>c.supertype==="Energy");
    if(ei<0)return st;
    const ec=st[myKey].hand.splice(ei,1)[0];const et=ec.types?.[0]||"Colorless";
    let tgt=a.target==="active"?st[myKey].active:typeof a.target==="number"?st[myKey].bench[a.target]:null;
    if(!tgt)return st;
    tgt.energies=tgt.energies||{};tgt.energies[et]=(tgt.energies[et]||0)+1;
    st.energyUsed=true;st.log=[`⚡ ${et} Energy → ${tgt.name}! (${sumEnergy(tgt)} total)`,...st.log];
  }else if(a.type==="playPokemon"){
    const pi=a.card?st[myKey].hand.findIndex(c=>c.uid===a.card.uid):-1;if(pi<0)return st;
    const p=st[myKey].hand.splice(pi,1)[0];
    if(!st[myKey].active){st[myKey].active={...p,uid:uid(),damage:0,energies:{},status:null};st.log=[`🃏 ${p.name} is now Active!`,...st.log]}
    else if(st[myKey].bench.length<MAX_BENCH){st[myKey].bench.push({...p,uid:uid(),damage:0,energies:{},status:null});st.log=[`🃏 ${p.name} to Bench!`,...st.log]}
  }else if(a.type==="playTrainer"){st=doTrainer(st,myKey,theirKey,a.card)}
  else if(a.type==="evolve"){st=doEvolve(st,myKey,a.card,a.isActive,a.benchIdx)}
  else if(a.type==="retreat"){st=doRetreat(st,myKey,a.benchIdx)}
  else if(a.type==="attack"){
    if(st.attacked||st.firstTurn||!canUseAttack(st[myKey].active,a.atkIdx))return st;
    st=doAttack(st,myKey,theirKey,a.atkIdx,a.coinResult);st.attacked=true;
  }else if(a.type==="endTurn"){
    if(st.mode==="passplay"){
      st.passplayTurn=myKey==="player"?"player2":"player1";st.passplayWaiting=true;
      st.energyUsed=false;st.attacked=false;st.firstTurn=false;st[myKey].retreated=false;st[myKey].supporterUsed=false;
      const nk=myKey==="player"?"bot":"player";
      const r=applyStatusTick(st[nk],st.log);st[nk]=r.side;st.log=r.log;
      if(st[nk].deck.length)st[nk].hand.push({...st[nk].deck.shift(),uid:uid()});
      return st;
    }
    st.firstTurn=false;st.turn="bot";st.energyUsed=false;st.attacked=false;st[myKey].retreated=false;st[myKey].supporterUsed=false;
  }else if(a.type==="resumePassplay"){st.passplayWaiting=false;st.firstTurn=false}
  return st;
}

}

          imgSrc?<img src={imgSrc} alt={card.name} style={{width:card.image?"100%":"88%",height:card.image?"100%":"88%",objectFit:card.image?"cover":"contain",imageRendering:sprite?"pixelated":"auto"}} onError={e=>e.target.style.display="none"}/>:
          <div style={{textAlign:"center"}}><div style={{fontSize:40}}>{TE[card.types?.[0]]||"✨"}</div><div style={{color:"rgba(255,255,255,.5)",fontSize:10,marginTop:4}}>{card.name}</div></div>}
        </div>
        <div style={{flex:1,minWidth:0}}>
          <h3 style={{fontFamily:"'Fredoka One',cursive",color:"#fff",fontSize:18,margin:"0 0 5px",lineHeight:1.1}}>{card.name}</h3>
          <div style={{display:"flex",gap:3,flexWrap:"wrap",marginBottom:5}}>
            {card.types?.map(t=><span key={t} style={{background:TC[t]||"#94A3B8",color:"#fff",fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:99}}>{TE[t]} {t}</span>)}
            {isTrain&&<span style={{background:trainBg,color:"#fff",fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:99}}>{card.subtypes?.[0]}</span>}
          </div>
          {card.hp&&<p style={{color:"#FFD700",fontWeight:900,fontSize:16,margin:"2px 0"}}>{card.hp} HP</p>}
          <p style={{color:"rgba(255,255,255,.3)",fontSize:10,margin:"3px 0"}}>{card.rarity}</p>
          {(card.retreatCost||0)>0&&<p style={{color:"rgba(255,255,255,.3)",fontSize:10,margin:"3px 0"}}>Retreat: ⚪×{card.retreatCost}</p>}
          {card.weaknesses?.length>0&&<p style={{color:"#FCA5A5",fontSize:10,margin:"2px 0"}}>Weak: {card.weaknesses.map(w=>`${w.type} ${w.value||"×2"}`).join(", ")}</p>}
          {card.resistances?.length>0&&<p style={{color:"#86EFAC",fontSize:10,margin:"2px 0"}}>Resist: {card.resistances.map(r=>`${r.type} ${r.value||"-30"}`).join(", ")}</p>}
        </div>
      </div>
      {isTrain&&card.text&&<div style={{background:"rgba(255,255,255,.05)",borderRadius:12,padding:"10px 12px",marginBottom:10,border:"1px solid rgba(255,255,255,.07)"}}><p style={{color:"rgba(255,255,255,.8)",fontSize:12,margin:0,lineHeight:1.6,fontStyle:"italic"}}>{card.text}</p></div>}
      {card.attacks?.length>0&&<div style={{marginBottom:10}}>
        <p style={{color:"rgba(255,255,255,.35)",fontSize:10,textTransform:"uppercase",letterSpacing:1,fontWeight:700,margin:"0 0 6px"}}>Attacks</p>
        {card.attacks.map((atk,i)=>{const info=parseAtkText(atk.text||"");return<div key={i} style={{background:"rgba(255,255,255,.05)",borderRadius:11,padding:"8px 10px",marginBottom:5,border:"1px solid rgba(255,255,255,.07)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}><span style={{color:"#fff",fontWeight:800,fontSize:13}}>{info.needsCoin?"🪙 ":""}{atk.name}</span><span style={{color:"#FBBF24",fontWeight:900,fontSize:18}}>{atk.damage||"—"}</span></div>
          <div style={{display:"flex",gap:3,marginBottom:atk.text?4:0,flexWrap:"wrap"}}>{!atk.cost?.length?<span style={{color:"rgba(255,255,255,.25)",fontSize:10}}>Free</span>:(atk.cost||[]).map((c,ci)=><span key={ci} style={{background:TC[c]||"#94A3B8",color:"#fff",fontSize:9,fontWeight:700,padding:"2px 6px",borderRadius:99}}>{TE[c]||c[0]} {c}</span>)}</div>
          {atk.text&&<p style={{color:"rgba(255,255,255,.4)",fontSize:10,margin:0,lineHeight:1.5,fontStyle:"italic"}}>{atk.text}</p>}
        </div>;})}
      </div>}
      {actionButtons?.length>0&&<div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:10}}>
        {actionButtons.map((a,i)=><button key={i} onClick={a.fn} disabled={a.disabled} style={{padding:"10px",borderRadius:11,background:a.disabled?"rgba(255,255,255,.05)":a.color||"linear-gradient(135deg,#4ADE80,#16A34A)",color:a.disabled?"rgba(255,255,255,.2)":"#fff",fontWeight:800,fontSize:13,border:"none",cursor:a.disabled?"not-allowed":"pointer",opacity:a.disabled?.45:1}}>{a.label}</button>)}
      </div>}
      <button onClick={onClose} style={{width:"100%",padding:"9px",borderRadius:11,background:"rgba(255,255,255,.07)",color:"rgba(255,255,255,.6)",fontWeight:700,fontSize:12,border:"1px solid rgba(255,255,255,.1)",cursor:"pointer"}}>Close</button>
    </div>
  </div>;
}

// Energy Target Modal
function EnergyTargetModal({card,side,energyUsed,onAttach,onClose}){
  const tc=TC[card.types?.[0]]||"#94A3B8";
  const targets=[];
  if(side.active)targets.push({...side.active,isActive:true,target:"active"});
  side.bench.forEach((b,i)=>targets.push({...b,isActive:false,target:i}));
  return<div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.9)",zIndex:210,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
    <div onClick={e=>e.stopPropagation()} style={{background:"linear-gradient(160deg,#1e1b4b,#0f0c29)",borderRadius:20,padding:18,width:"100%",maxWidth:320,border:`2px solid ${tc}`,animation:"slideUp .2s ease"}}>
      <h3 style={{fontFamily:"'Fredoka One',cursive",color:"#fff",fontSize:18,margin:"0 0 4px"}}>{TE[card.types?.[0]]||"⚡"} Attach {card.types?.[0]} Energy</h3>
      {energyUsed?<p style={{color:"#F87171",fontSize:12,margin:"0 0 10px"}}>⚠️ Already attached energy this turn</p>:<p style={{color:"rgba(255,255,255,.4)",fontSize:12,margin:"0 0 10px"}}>Choose which Pokémon to power up</p>}
      <div style={{display:"flex",flexDirection:"column",gap:7}}>
        {targets.map((t,i)=><button key={i} onClick={()=>!energyUsed&&onAttach(t.target)} disabled={energyUsed} style={{display:"flex",alignItems:"center",gap:9,padding:"8px 10px",borderRadius:11,background:`rgba(255,255,255,${energyUsed?.03:.07})`,border:`1px solid ${TC[t.types?.[0]]||"#94A3B8"}44`,cursor:energyUsed?"not-allowed":"pointer"}}>
          <div style={{width:38,height:52,borderRadius:7,overflow:"hidden",background:`linear-gradient(135deg,${TC[t.types?.[0]]||"#94A3B8"}33,${TC[t.types?.[0]]||"#94A3B8"}66)`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            {(t.image||getSprite(t.name))?<img src={t.image||getSprite(t.name)} alt={t.name} style={{width:"90%",height:"90%",objectFit:"contain",imageRendering:"pixelated"}} onError={e=>e.target.style.display="none"}/>:<span style={{fontSize:16}}>{TE[t.types?.[0]]||"?"}</span>}
          </div>
          <div style={{flex:1,minWidth:0}}>
            <p style={{color:"#fff",fontWeight:700,fontSize:13,margin:"0 0 1px"}}>{t.name}</p>
            <p style={{color:"rgba(255,255,255,.4)",fontSize:10,margin:"0 0 3px"}}>{t.isActive?"Active":"Bench"} · {Math.max(0,(t.hp||60)-(t.damage||0))}/{t.hp||60} HP</p>
            <EnergyDots energies={t.energies}/>
          </div>
          {!energyUsed&&<span style={{background:tc,color:"#fff",fontSize:10,fontWeight:700,padding:"3px 8px",borderRadius:99,flexShrink:0}}>⚡</span>}
        </button>)}
      </div>
      <button onClick={onClose} style={{width:"100%",marginTop:10,padding:"8px",borderRadius:11,background:"rgba(255,255,255,.06)",color:"rgba(255,255,255,.5)",fontWeight:700,fontSize:12,border:"none",cursor:"pointer"}}>Cancel</button>
    </div>
  </div>;
}

// Pack reveal animation
function PackRevealScreen({cards,onDone}){
  const[flipped,setFlipped]=useState(Array(cards.length).fill(false));

  return<div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:16,padding:"20px 16px",minHeight:"80vh",justifyContent:"center"}}>

    <h2 style={{fontFamily:"'Fredoka One',cursive",fontSize:32,color:"#FFD700",textShadow:"3px 3px 0 #CC0000",margin:0}}>{all?"New Cards! ✨":"Tap to reveal!"}</h2>
    <div style={{display:"flex",flexWrap:"wrap",justifyContent:"center",gap:10,maxWidth:380}}>
      {cards.map((card,i)=><div key={i} className="fc" style={{animation:`bounceIn .5s ${i*.07}s both`,position:"relative"}}>
        <div className={`fci${flipped[i]?" flipped":""}`} style={{width:116,height:162}} onClick={()=>{if(flipped[i])setDetail(card);else{setFlipped(p=>p.map((f,j)=>j===i?true:f));SFX.card()}}}>
          <div className="ff" style={{width:116,height:162}}><CardView showBack size="md"/></div>

      </div>)}

    </div>
  </div>;
}

// ═══════ BATTLE GAME ═══════
function BattleGame({state,dispatch,onEnd}){
  const[selCard,setSelCard]=useState(null);
  const[energyTarget,setEnergyTarget]=useState(null);
  const[retreatPicking,setRetreatPicking]=useState(false);
  const[evolvePicking,setEvolvePicking]=useState(null);
  const[coinFlip,setCoinFlip]=useState(null);
  const[trainerPreview,setTrainerPreview]=useState(null);
  const{player,bot,turn,energyUsed,attacked,log,winner,mode,passplayTurn,passplayWaiting,firstTurn}=state;

  if(passplayWaiting){
    const nName=passplayTurn==="player1"?"Player 1":"Player 2";
    return<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",gap:20,padding:24,textAlign:"center"}}>
      <div style={{fontSize:64}}>🔄</div>
      <h2 style={{fontFamily:"'Fredoka One',cursive",fontSize:28,color:"#fff",margin:0}}>Pass to {nName}!</h2>
      <button onClick={()=>{setSelCard(null);setEnergyTarget(null);dispatch({type:"resumePassplay"})}} style={{background:"#FFD700",color:"#000",fontWeight:900,fontSize:17,padding:"14px 32px",borderRadius:16,border:"none",cursor:"pointer",fontFamily:"'Fredoka One',cursive"}}>I'm {nName} — Ready! ✓</button>
    </div>;
  }

  const myKey=mode==="passplay"?(passplayTurn==="player1"?"player":"bot"):"player";
  const theirKey=myKey==="player"?"bot":"player";
  const myLabel=mode==="passplay"?(passplayTurn==="player1"?"P1":"P2"):"You";
  const theirLabel=mode==="passplay"?(passplayTurn==="player1"?"P2":"P1"):"Bot";
  const mySide=state[myKey],theirSide=state[theirKey];
  const myActive=mySide.active,theirActive=theirSide.active;
  const isMyTurn=mode==="bot"?turn==="player":true;
  const canRetreat=isMyTurn&&!winner&&myActive&&mySide.bench.length>0&&!mySide.retreated&&sumEnergy(myActive)>=(myActive.retreatCost||0);

  const handleCardTap=card=>{
    if(!isMyTurn||winner)return;
    SFX.card();
    if(card.supertype==="Energy"){setEnergyTarget(card);return}
    if(card.supertype==="Trainer"){setTrainerPreview(card);return} // ★ preview first
    if(card.supertype==="Pokémon"&&EVO_FROM[card.name]){
      const tgts=[];
      if(myActive?.name===EVO_FROM[card.name])tgts.push({poke:myActive,isActive:true,benchIdx:-1,label:`Active: ${myActive.name}`});
      mySide.bench.forEach((b,i)=>{if(b.name===EVO_FROM[card.name])tgts.push({poke:b,isActive:false,benchIdx:i,label:`Bench: ${b.name}`})});
      if(tgts.length>0){setEvolvePicking({card,tgts});return}
    }
    setSelCard(card);
  };

  const handleAttack=i=>{
    if(!myActive||attacked||firstTurn||!canUseAttack(myActive,i))return;
    const atk=myActive.attacks?.[i];if(!atk)return;
    const info=parseAtkText(atk.text||"");
    SFX.atk();
    if(info.needsCoin||myActive.status==="Confused"){setCoinFlip({atkIdx:i,confused:myActive.status==="Confused"});return}
    dispatch({type:"attack",atkIdx:i,myKey,theirKey,coinResult:null});
  };

  const retStyle=canRetreat?{background:"linear-gradient(135deg,#60A5FA,#2563EB)",color:"#fff"}:{background:"rgba(255,255,255,.06)",color:"rgba(255,255,255,.2)"};

  return<div style={{display:"flex",flexDirection:"column",gap:6,padding:7,minHeight:"100%",position:"relative"}}>
    {coinFlip&&<CoinFlipModal onResult={r=>{dispatch({type:"attack",atkIdx:coinFlip.atkIdx,myKey,theirKey,coinResult:r});setCoinFlip(null)}}/>}
    {energyTarget&&<EnergyTargetModal card={energyTarget} side={mySide} energyUsed={energyUsed} onAttach={tgt=>{SFX.card();dispatch({type:"attachEnergy",myKey,theirKey,card:energyTarget,target:tgt});setEnergyTarget(null)}} onClose={()=>setEnergyTarget(null)}/>}
    {trainerPreview&&<TrainerPreviewModal card={trainerPreview} onPlay={()=>{dispatch({type:"playTrainer",myKey,theirKey,card:trainerPreview});SFX.heal();setTrainerPreview(null)}} onCancel={()=>setTrainerPreview(null)}/>}
    {evolvePicking&&<div onClick={()=>setEvolvePicking(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.9)",zIndex:210,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"linear-gradient(160deg,#1e1b4b,#0f0c29)",borderRadius:20,padding:18,width:"100%",maxWidth:300,border:"2px solid #FBBF24",animation:"slideUp .2s ease"}}>
        <h3 style={{fontFamily:"'Fredoka One',cursive",color:"#FFD700",fontSize:20,margin:"0 0 10px"}}>🌟 Evolve into {evolvePicking.card.name}!</h3>
        {evolvePicking.tgts.map((t,i)=><button key={i} onClick={()=>{SFX.evo();dispatch({type:"evolve",myKey,theirKey,card:evolvePicking.card,isActive:t.isActive,benchIdx:t.benchIdx});setEvolvePicking(null)}} style={{width:"100%",padding:"10px",marginBottom:6,borderRadius:11,background:"linear-gradient(135deg,#FBBF24,#D97706)",color:"#000",fontWeight:800,fontSize:13,border:"none",cursor:"pointer"}}>{t.label}</button>)}
        <button onClick={()=>setEvolvePicking(null)} style={{width:"100%",padding:"8px",borderRadius:11,background:"rgba(255,255,255,.07)",color:"rgba(255,255,255,.5)",fontWeight:700,fontSize:12,border:"none",cursor:"pointer"}}>Cancel</button>
      </div>
    </div>}
    {retreatPicking&&<div onClick={()=>setRetreatPicking(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.9)",zIndex:210,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"linear-gradient(160deg,#1e1b4b,#0f0c29)",borderRadius:20,padding:18,width:"100%",maxWidth:300,border:"2px solid #60A5FA",animation:"slideUp .2s ease"}}>
        <h3 style={{fontFamily:"'Fredoka One',cursive",color:"#60A5FA",fontSize:20,margin:"0 0 6px"}}>🔄 Retreat {myActive?.name}</h3>
        <p style={{color:"rgba(255,255,255,.4)",fontSize:12,margin:"0 0 10px"}}>Costs {myActive?.retreatCost||0} ⚡. Choose replacement:</p>
        {mySide.bench.map((b,i)=><button key={i} onClick={()=>{dispatch({type:"retreat",myKey,theirKey,benchIdx:i});setRetreatPicking(false)}} style={{width:"100%",padding:"10px",marginBottom:6,borderRadius:11,background:"linear-gradient(135deg,#60A5FA,#2563EB)",color:"#fff",fontWeight:800,fontSize:13,border:"none",cursor:"pointer",display:"flex",alignItems:"center",gap:8}}>
          {getSprite(b.name)&&<img src={getSprite(b.name)} style={{width:26,height:26,objectFit:"contain",imageRendering:"pixelated"}} onError={e=>e.target.style.display="none"}/>}{b.name} ({Math.max(0,(b.hp||60)-(b.damage||0))}/{b.hp||60})
        </button>)}
        <button onClick={()=>setRetreatPicking(false)} style={{width:"100%",padding:"8px",borderRadius:11,background:"rgba(255,255,255,.07)",color:"rgba(255,255,255,.5)",fontWeight:700,fontSize:12,border:"none",cursor:"pointer"}}>Cancel</button>
      </div>
    </div>}
    {selCard&&<CardDetailModal card={selCard} onClose={()=>setSelCard(null)} actionButtons={[selCard.supertype==="Pokémon"&&{label:"🃏 Play to Bench",fn:()=>{dispatch({type:"playPokemon",myKey,theirKey,card:selCard});setSelCard(null)},disabled:mySide.bench.length>=MAX_BENCH,color:"linear-gradient(135deg,#16A34A,#15803D)"}].filter(Boolean)}/>}
    {winner&&<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.93)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",zIndex:50,borderRadius:12,gap:14}}>
      <div style={{fontSize:72}}>{winner===myKey?"🏆":"😢"}</div>
      <h2 style={{fontFamily:"'Fredoka One',cursive",fontSize:34,color:"#FFD700",textShadow:"3px 3px 0 #CC0000",margin:0}}>{mode==="passplay"?(winner==="player"?"P1 Wins!":"P2 Wins!"):winner==="player"?"You Win!":"Bot Wins!"}</h2>
      {winner==="player"&&mode==="bot"&&<p style={{color:"#4ADE80",fontWeight:700,fontSize:15}}>+{WIN_COINS} coins & +50 XP! 🪙</p>}
      <button onClick={onEnd} style={{background:"#FFD700",color:"#000",fontWeight:900,fontSize:17,padding:"13px 36px",borderRadius:16,border:"none",cursor:"pointer",fontFamily:"'Fredoka One',cursive"}}>Continue</button>
    </div>}

    {/* Opponent field */}
    <div style={{background:"rgba(190,18,60,.1)",border:"1px solid rgba(190,18,60,.18)",borderRadius:13,padding:"7px 9px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
        <span style={{color:"#FDA4AF",fontSize:11,fontWeight:700}}>⚔️ {theirLabel}{mode==="bot"&&turn==="bot"?" (thinking...)":""}</span>
        <span style={{color:"rgba(255,255,255,.3)",fontSize:10}}>🃏{theirSide.deck.length}</span>
      </div>
      <div style={{display:"flex",alignItems:"flex-start",gap:5}}>
        {/* ★ Prize pile visible */}
        <PrizePile count={theirSide.prizes.length} label={theirLabel} side="opponent"/>
        <div style={{display:"flex",gap:2,flexShrink:0,flexWrap:"wrap",maxWidth:80}}>{Array.from({length:Math.min(theirSide.hand.length,5)}).map((_,i)=><CardView key={i} showBack size="xs"/>)}</div>
        <div style={{display:"flex",gap:3,flex:1,justifyContent:"center",flexWrap:"wrap"}}>
          {theirSide.bench.map(c=><div key={c.uid} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:1}}>
            <CardView card={c} size="xs"/><EnergyDots energies={c.energies} max={4}/><StatusBadge status={c.status}/><div style={{width:52}}><HpBar pokemon={c} compact/></div>
          </div>)}
        </div>
        <div style={{flexShrink:0,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
          {theirActive?<><CardView card={theirActive} size="sm"/><EnergyDots energies={theirActive.energies}/><StatusBadge status={theirActive.status}/><div style={{width:84}}><HpBar pokemon={theirActive}/></div></>:<div style={{width:84,height:116,borderRadius:10,border:"2px dashed rgba(255,255,255,.1)",display:"flex",alignItems:"center",justifyContent:"center",color:"rgba(255,255,255,.12)",fontSize:11}}>KO'd</div>}
        </div>
      </div>
      {theirActive&&<AttackPanel pokemon={theirActive} label={`${theirLabel}: ${theirActive.name}`}/>}
    </div>

    {/* Log */}
    <div style={{background:"rgba(0,0,0,.48)",borderRadius:10,padding:"5px 9px",height:54,overflowY:"auto",flexShrink:0,border:"1px solid rgba(255,255,255,.05)"}}>
      {log.slice(0,10).map((l,i)=><p key={i} style={{color:`rgba(255,255,255,${Math.max(.15,.85-i*.08)})`,fontSize:10,margin:"1px 0",lineHeight:1.4}}>{l}</p>)}
    </div>

    {/* Player field */}
    <div style={{background:"rgba(29,78,216,.1)",border:"1px solid rgba(29,78,216,.2)",borderRadius:13,padding:"7px 9px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
        <span style={{color:"#93C5FD",fontSize:11,fontWeight:700}}>🛡️ {myLabel}{isMyTurn?" · YOUR TURN":""}{firstTurn?" (1st turn — no attack)":""}</span>
        <span style={{color:"rgba(255,255,255,.3)",fontSize:10}}>🃏{mySide.deck.length}</span>
      </div>
      <div style={{display:"flex",alignItems:"flex-start",gap:5}}>
        {/* ★ Prize pile visible */}
        <PrizePile count={mySide.prizes.length} label={myLabel} side="player"/>

// ═══════ DECK BUILDER ═══════
function DeckBuilderScreen({collection,decks,onSaveDeck,onDeleteDeck,onClose}){
  const[name,setName]=useState("My Deck");
  const[sel,setSel]=useState([]);
  const[tab,setTab]=useState("Pokémon");
  const[msg,setMsg]=useState("");
  const pokes=collection.filter(c=>c.supertype==="Pokémon");
  const trainers=collection.filter(c=>c.supertype==="Trainer");
  const pool=tab==="Pokémon"?pokes:trainers;
  const sc=t=>sel.filter(c=>c.supertype===t).length;
  const preview=useMemo(()=>{
    const tc={};sel.filter(c=>c.supertype==="Pokémon").forEach(p=>(p.types||["Colorless"]).forEach(t=>{tc[t]=(tc[t]||0)+1}));
    const sorted=Object.entries(tc).sort((a,b)=>b[1]-a[1]);
    const t1=sorted[0]?.[0]||"Colorless",t2=sorted[1]?.[0]||t1;
    const en=Math.max(6,DECK_ENERGY+(DECK_POKE-sc("Pokémon"))+(DECK_TRAINER-sc("Trainer")));
    return{t1,t2,e1:Math.ceil(en*.7),e2:Math.max(0,en-Math.ceil(en*.7)),total:sel.length+en};
  },[sel]);
  const toggle=card=>{
    if(sel.some(c=>c.uid===card.uid)){setSel(p=>p.filter(c=>c.uid!==card.uid));return}
    if(card.supertype==="Pokémon"&&sc("Pokémon")>=DECK_POKE)return;
    if(card.supertype==="Trainer"&&sc("Trainer")>=DECK_TRAINER)return;
    setSel(p=>[...p,card]);
  };
  const save_deck=()=>{
    if(sc("Pokémon")===0){setMsg("Need at least 1 Pokémon!");return}
    const tc={};sel.filter(c=>c.supertype==="Pokémon").forEach(p=>(p.types||["Colorless"]).forEach(t=>{tc[t]=(tc[t]||0)+1}));
    const sorted=Object.entries(tc).sort((a,b)=>b[1]-a[1]);
    const t1=sorted[0]?.[0]||"Colorless",t2=sorted[1]?.[0]||t1;
    const en=Math.max(6,DECK_ENERGY+(DECK_POKE-sc("Pokémon"))+(DECK_TRAINER-sc("Trainer")));
    const e1=Math.ceil(en*.7),e2=Math.max(0,en-e1);
    const cards=shuffle([...sel.map(c=>({...c,uid:uid()})),...Array.from({length:e1},()=>makeEnergy(t1)),...Array.from({length:e2},()=>makeEnergy(t2))]);
    onSaveDeck({id:uid(),name:name||"My Deck",cards,createdAt:Date.now()});
    setMsg(`"${name}" saved! (${cards.length} cards)`);setTimeout(()=>setMsg(""),3000);
  };
  return<div style={{display:"flex",flexDirection:"column",height:"100%"}}>
    <div style={{padding:"10px 16px 8px",flexShrink:0}}>
      <div style={{display:"flex",gap:8,marginBottom:8}}>
        <input value={name} onChange={e=>setName(e.target.value)} placeholder="Deck name…" style={{flex:1,background:"rgba(255,255,255,.07)",color:"#fff",border:"1px solid rgba(255,255,255,.12)",borderRadius:11,padding:"7px 12px",fontSize:13,outline:"none"}}/>
        <button onClick={()=>{setSel([...pokes.slice(0,DECK_POKE).map(p=>({...p})),...trainers.slice(0,DECK_TRAINER).map(t=>({...t}))])}} style={{padding:"7px 12px",borderRadius:11,background:"linear-gradient(135deg,#38BDF8,#1D4ED8)",color:"#fff",fontWeight:700,fontSize:11,border:"none",cursor:"pointer",flexShrink:0}}>Auto</button>
      </div>
      <div style={{background:"rgba(255,255,255,.05)",borderRadius:11,padding:"7px 10px",marginBottom:8,fontSize:11,color:"rgba(255,255,255,.5)"}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
          <span>🃏 {sc("Pokémon")}/{DECK_POKE} Pokémon</span>
          <span>📜 {sc("Trainer")}/{DECK_TRAINER} Trainers</span>
          <span>⚡ {preview.e1+preview.e2} Energy (auto)</span>
        </div>
        <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
          {preview.e1>0&&<span style={{background:TC[preview.t1]||"#94A3B8",color:"#fff",fontSize:9,fontWeight:700,padding:"2px 7px",borderRadius:99}}>{TE[preview.t1]} ×{preview.e1}</span>}
          {preview.e2>0&&preview.t2!==preview.t1&&<span style={{background:TC[preview.t2]||"#94A3B8",color:"#fff",fontSize:9,fontWeight:700,padding:"2px 7px",borderRadius:99}}>{TE[preview.t2]} ×{preview.e2}</span>}
          <span style={{color:"rgba(255,255,255,.3)",fontSize:9,marginLeft:"auto"}}>Total: {preview.total}</span>
        </div>
      </div>
      <div style={{display:"flex",gap:7,marginBottom:8}}>{["Pokémon","Trainer"].map(t=><button key={t} onClick={()=>setTab(t)} style={{flex:1,padding:"6px",borderRadius:10,fontSize:12,fontWeight:700,border:"none",cursor:"pointer",background:tab===t?"linear-gradient(135deg,#A78BFA,#4338CA)":"rgba(255,255,255,.07)",color:tab===t?"#fff":"rgba(255,255,255,.5)"}}>{t}s ({(t==="Pokémon"?pokes:trainers).length})</button>)}</div>
      {/* Saved decks list */}
      {decks.length>0&&<div style={{marginBottom:8}}>
        <p style={{color:"rgba(255,255,255,.35)",fontSize:11,margin:"0 0 5px",fontWeight:700}}>Saved Decks</p>
        <div style={{display:"flex",gap:5,overflowX:"auto",paddingBottom:4}}>
          {decks.map(d=><div key={d.id} style={{flexShrink:0,background:"rgba(255,255,255,.07)",borderRadius:10,padding:"5px 8px",display:"flex",alignItems:"center",gap:6}}>
            <span style={{color:"#fff",fontSize:11,fontWeight:700}}>{d.name}</span>
            <button onClick={()=>onDeleteDeck(d.id)} style={{background:"rgba(239,68,68,.3)",color:"#F87171",border:"none",borderRadius:5,fontSize:10,padding:"2px 5px",cursor:"pointer"}}>✕</button>
          </div>)}
        </div>
      </div>}
    </div>
    <div style={{flex:1,overflowY:"auto",padding:"0 16px 8px"}}>
      {pool.length===0?<div style={{textAlign:"center",padding:"30px 0",color:"rgba(255,255,255,.3)",fontSize:13}}>No {tab} cards — open packs!</div>:
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
        {pool.map(card=><div key={card.uid} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
          <CardView card={card} size="md" selected={sel.some(c=>c.uid===card.uid)} onClick={()=>toggle(card)}/>
          <p style={{color:"rgba(255,255,255,.45)",fontSize:9,textAlign:"center",margin:0,width:"100%",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{card.name}</p>
        </div>)}
      </div>}
    </div>
    <div style={{padding:"8px 16px 12px",flexShrink:0,borderTop:"1px solid rgba(255,255,255,.07)"}}>
      {msg&&<p style={{color:"#4ADE80",fontSize:12,textAlign:"center",margin:"0 0 6px"}}>{msg}</p>}
      <div style={{display:"flex",gap:8}}>
        <button onClick={save_deck} style={{flex:1,padding:"11px",borderRadius:13,background:"linear-gradient(135deg,#FFD700,#FF8C00)",color:"#000",fontWeight:900,fontSize:14,border:"none",cursor:"pointer",fontFamily:"'Fredoka One',cursive"}}>💾 Save Deck</button>
        <button onClick={onClose} style={{flex:1,padding:"11px",borderRadius:13,background:"rgba(255,255,255,.07)",color:"rgba(255,255,255,.55)",fontWeight:700,fontSize:14,border:"none",cursor:"pointer"}}>Cancel</button>
      </div>
    </div>
  </div>;
}

// ═══════ MAIN APP ═══════
function App(){
  const[appState,appDispatch]=useReducer(appReducer,null);
  const[screen,setScreen]=useState("home");
  const[starterPool,setStarterPool]=useState([]);
  const[loading,setLoading]=useState(true);
  const[packAnim,setPackAnim]=useState(false);
  const[packLoading,setPackLoading]=useState(false); // ★ loading state for pack
  const[newCards,setNewCards]=useState([]);
  const[battle,setBattle]=useState(null);
  const[showDeckBuilder,setShowDeckBuilder]=useState(false);
  const initialized=useRef(false);
  const saveTimer=useRef(null);
  const winHandled=useRef(false);

  // ★ Load state from storage once on mount
  useEffect(()=>{
    async function init(){
      const saved=await load("pc8_save",null);
      appDispatch({type:"INIT",payload:saved||INIT_STATE});
      initialized.current=true;
      const st=await load("pc8_starters",null);
      if(st?.length>0){setStarterPool(st);setLoading(false);return}
      try{
        const res=await fetch(`${API}/cards?q=supertype:Pok%C3%A9mon%20subtypes:Basic&pageSize=60&orderBy=name`);
        const data=await res.json();
        const cards=(data.data||[]).filter(c=>(c.attacks?.length||0)>0&&c.images?.small).map(normalizeApiCard);
        const pool=cards.length>0?cards:FBP.map(p=>({...p,uid:uid()}));
        setStarterPool(pool);await save("pc8_starters",pool);
      }catch{setStarterPool(FBP.map(p=>({...p,uid:uid()})))}
      setLoading(false);
    }
    init();
  },[]);

  // ★ Auto-save whenever appState changes (debounced 400ms)
  useEffect(()=>{
    if(!initialized.current||!appState)return;
    clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(()=>save("pc8_save",appState),400);
    // Sync SFX settings
    SFX.on=appState.soundEnabled??true;
    SFX.vol=appState.soundVolume??0.25;
  },[appState]);

  const isDailyAvailable=!appState?.lastDaily||(Date.now()-new Date(appState.lastDaily).getTime()>86400000);

  // ★ Pack buy — shows loading spinner then reveal
  const handleBuyPack=useCallback(async(pack)=>{
    if(!pack){setPackAnim(false);setNewCards([]);return}
    if(!appState||appState.coins<pack.cost){SFX.err();return}
    setPackLoading(true);
    let cards=[];
    try{
      const res=await fetch(`${API}/cards?q=${encodeURIComponent(pack.query)}&pageSize=20&page=${1+Math.floor(Math.random()*6)}`);
      const data=await res.json();
      const pool=(data.data||[]).filter(c=>c.images?.small).map(normalizeApiCard);
      cards=shuffle(pool).slice(0,pack.count||5);
    }catch{}
    while(cards.length<(pack.count||5))cards.push({...FBP[Math.floor(Math.random()*FBP.length)],uid:uid()});
    const trainers=pack.trainers>0?shuffle(TRAINER_POOL).slice(0,pack.trainers).map(t=>({...t,uid:uid()})):[];
    const allNew=[...cards,...trainers];
    setPackLoading(false);
    setNewCards(allNew);setPackAnim(true);
    appDispatch({type:"BUY_PACK",cost:pack.cost,cards:allNew});
  },[appState?.coins]);

  const handleStartBattle=useCallback((mode,deckObj)=>{
    if(!appState)return;
    winHandled.current=false;
    const myPokes=appState.collection.filter(c=>c.supertype==="Pokémon");
    const playerDeck=deckObj?.cards?shuffle(deckObj.cards.map(c=>({...c,uid:uid()}))):
      myPokes.length>=2?autoBuildDeck(appState.collection):
      FBP.slice(0,DECK_POKE).map(p=>({...p,uid:uid()})).concat(Array.from({length:DECK_ENERGY},()=>makeEnergy("Colorless")));
    const botPool=shuffle([...FBP,...starterPool.filter(c=>c.supertype==="Pokémon")]).slice(0,20);
    const b=initBattle(playerDeck,botPool,mode);
    if(!b)return;
    setBattle(b);setScreen("game");
  },[appState,starterPool]);

  const bDispatch=useCallback(action=>{
    setBattle(prev=>{if(!prev||prev.winner)return prev;return battleReducer(prev,action)});
  },[]);

  // Bot turn
  useEffect(()=>{
    if(!battle||battle.turn!=="bot"||battle.winner||battle.mode!=="bot")return;
    const t=setTimeout(()=>{
      const ns=botTurn(battle);setBattle(ns);
      if(ns.winner==="player"&&!winHandled.current){
        winHandled.current=true;SFX.prize();
        const bs=ns.statsThisBattle||{};
        appDispatch({type:"WIN_BATTLE",kos:bs.kos||0,damage:bs.damage||0,evos:bs.evos||0});
      } else if(ns.winner==="bot"&&!winHandled.current){
        winHandled.current=true;SFX.ko();
        const bs=ns.statsThisBattle||{};
        appDispatch({type:"LOSS_BATTLE",kos:bs.kos||0,damage:bs.damage||0,evos:bs.evos||0});
      }
    },1400);
    return()=>clearTimeout(t);
  },[battle?.turn,battle?.winner]);

  const handleBattleEnd=useCallback(()=>{setBattle(null);setScreen("home")},[]);
  const handleClaimQuest=useCallback(q=>{appDispatch({type:"CLAIM_QUEST",questId:q.id,reward:q.reward,xp:q.xp||QUEST_XP})},[]);
  const handleSaveDeck=useCallback(d=>{appDispatch({type:"SAVE_DECK",deck:d})},[]);
  const handleDeleteDeck=useCallback(id=>{appDispatch({type:"DELETE_DECK",deckId:id})},[]);
  const handleReset=useCallback(async()=>{await save("pc8_save",null);await save("pc8_starters",null);window.location.reload()},[]);

  const claimable=appState?QUESTS.filter(q=>((appState.questStats?.[q.stat]||0)>=q.target)&&!appState.claimedQuests?.includes(q.id)).length:0;
  const NAV=[{id:"home",i:"🏠",l:"Home"},{id:"collection",i:"🃏",l:"Cards"},{id:"shop",i:"🛍️",l:"Shop"},{id:"battle",i:"⚔️",l:"Battle"},{id:"quests",i:"📋",l:"Quests"}];
  const TITLE={home:"⚡ PokéCards!",collection:"🃏 My Cards",shop:"🛍️ Shop",battle:"⚔️ Battle",quests:"📋 Quests",pokedex:"📖 Pokédex",settings:"⚙️ Settings"};

  if(loading||!appState)return<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(160deg,#0f0c29,#302b63,#24243e)"}}>
    <div style={{textAlign:"center"}}><div style={{fontSize:72,animation:"bounce 1s infinite"}}>⚡</div><p style={{fontFamily:"'Fredoka One',cursive",fontSize:26,color:"#FFD700",margin:"12px 0"}}>Loading PokéCards…</p></div>
  </div>;

  const{coins,collection,wins,totalXp,tradeTokens,lastDaily,questStats,claimedQuests,decks}=appState;

  return<div style={{minHeight:"100vh",display:"flex",flexDirection:"column",maxWidth:440,margin:"0 auto",overflow:"hidden",background:"linear-gradient(160deg,#0f0c29 0%,#302b63 55%,#24243e 100%)"}}>
    {/* Deck Builder overlay */}
    {showDeckBuilder&&<div style={{position:"fixed",inset:0,zIndex:300,background:"linear-gradient(160deg,#0f0c29,#302b63,#24243e)",display:"flex",flexDirection:"column"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"11px 16px",borderBottom:"1px solid rgba(255,255,255,.07)",background:"rgba(0,0,0,.3)",flexShrink:0}}>
        <span style={{fontFamily:"'Fredoka One',cursive",color:"#fff",fontSize:17}}>🃏 Deck Builder</span>
        <span style={{background:"linear-gradient(135deg,#FFD700,#FF8C00)",color:"#000",fontWeight:900,fontSize:12,padding:"3px 10px",borderRadius:99}}>🪙 {coins}</span>
      </div>
      <div style={{flex:1,overflowY:"auto"}}><DeckBuilderScreen collection={collection} decks={decks||[]} onSaveDeck={handleSaveDeck} onDeleteDeck={handleDeleteDeck} onClose={()=>setShowDeckBuilder(false)}/></div>
    </div>}

    {/* Header */}
    {screen!=="game"&&<div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 16px",borderBottom:"1px solid rgba(255,255,255,.07)",background:"rgba(0,0,0,.25)",backdropFilter:"blur(12px)",zIndex:10,flexShrink:0}}>
      {screen!=="home"?<button onClick={()=>setScreen("home")} style={{color:"rgba(255,255,255,.4)",fontSize:13,fontWeight:700,background:"none",border:"none",cursor:"pointer"}}>← Back</button>:<div style={{width:52}}/>}
      <span style={{fontFamily:"'Fredoka One',cursive",color:"#fff",fontSize:16}}>{TITLE[screen]||"PokéCards"}</span>
      <span style={{background:"linear-gradient(135deg,#FFD700,#FF8C00)",color:"#000",fontWeight:900,fontSize:12,padding:"3px 10px",borderRadius:99}}>🪙 {coins}</span>
    </div>}

    {/* Content */}
    <div style={{flex:1,overflowY:"auto",position:"relative",zIndex:5,display:screen==="game"?"flex":"block",flexDirection:"column"}}>
      {screen==="home"&&<HomeScreen coins={coins} collection={collection} wins={wins} totalXp={totalXp} onDaily={()=>appDispatch({type:"DAILY"})} dailyAvailable={isDailyAvailable} navigate={setScreen} questStats={questStats||{}} claimedQuests={claimedQuests||[]}/>}
      {screen==="collection"&&<div style={{display:"flex",flexDirection:"column",height:"100%"}}>
        <div style={{padding:"8px 16px",flexShrink:0}}><button onClick={()=>setShowDeckBuilder(true)} style={{width:"100%",padding:"10px",borderRadius:13,background:"linear-gradient(135deg,#A78BFA,#4338CA)",color:"#fff",fontWeight:800,fontSize:13,border:"none",cursor:"pointer"}}>🃏 Build / Edit Decks ({(decks||[]).length} saved)</button></div>
        <div style={{flex:1,overflow:"hidden"}}><CollectionScreen collection={collection}/></div>
      </div>}
      {screen==="shop"&&<ShopScreen coins={coins} onBuyPack={handleBuyPack} packAnim={packAnim} packLoading={packLoading} newCards={newCards}/>}
      {screen==="battle"&&<BattleSelect collection={collection} decks={decks||[]} onStart={handleStartBattle}/>}
      {screen==="quests"&&<QuestScreen questStats={questStats||{}} claimedQuests={claimedQuests||[]} onClaim={handleClaimQuest}/>}
      {screen==="pokedex"&&<PokedexScreen collection={collection}/>}
      {screen==="settings"&&<SettingsScreen state={appState} onDispatch={appDispatch} onReset={handleReset} tradeTokens={tradeTokens}/>}
      {screen==="game"&&battle&&<div style={{display:"flex",flexDirection:"column",flex:1}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"7px 12px",background:"rgba(0,0,0,.45)",borderBottom:"1px solid rgba(255,255,255,.07)",flexShrink:0,zIndex:10}}>
          <button onClick={handleBattleEnd} style={{color:"rgba(255,255,255,.3)",fontSize:12,background:"none",border:"none",cursor:"pointer"}}>✕ Forfeit</button>
          <span style={{fontFamily:"'Fredoka One',cursive",color:"#fff",fontSize:14}}>⚔️ {battle.mode==="passplay"?"Pass & Play":"vs Bot"}</span>
          <span style={{fontSize:11,color:"rgba(255,255,255,.4)"}}>{battle.winner?"🎮 Over":battle.turn==="player"?"👤 Your turn":"🤖 Bot…"}</span>
        </div>
        <div style={{flex:1,overflowY:"auto",padding:7}}><BattleGame state={battle} dispatch={bDispatch} onEnd={handleBattleEnd}/></div>
      </div>}
    </div>

    {/* Nav */}
    {screen!=="game"&&<div style={{display:"flex",borderTop:"1px solid rgba(255,255,255,.07)",background:"rgba(0,0,0,.35)",backdropFilter:"blur(12px)",zIndex:10,flexShrink:0}}>
      {NAV.map(n=><button key={n.id} onClick={()=>setScreen(n.id)} style={{flex:1,padding:"9px 4px",display:"flex",flexDirection:"column",alignItems:"center",gap:1,background:"none",border:"none",cursor:"pointer",color:screen===n.id?"#FFD700":"rgba(255,255,255,.3)",position:"relative"}}>
        <span style={{fontSize:18}}>{n.i}</span><span style={{fontSize:9,fontWeight:700}}>{n.l}</span>
        {n.id==="quests"&&claimable>0&&<span style={{position:"absolute",top:5,right:6,width:8,height:8,borderRadius:"50%",background:"#EF4444",boxShadow:"0 0 6px rgba(239,68,68,.7)"}}/>}
      </button>)}
    </div>}
  </div>;
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
</body>
</html>
