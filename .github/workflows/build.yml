name: Build PokéCards APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Scaffold Android project
        run: |
          set -e
          PKG="com.dcheshirecat.pokecards"
          mkdir -p android/app/src/main/{assets,java/com/dcheshirecat/pokecards}
          mkdir -p android/app/src/main/res/{mipmap-mdpi,mipmap-hdpi,mipmap-xhdpi,mipmap-xxhdpi,mipmap-xxxhdpi,values}
          mkdir -p android/gradle/wrapper
          cp index.html android/app/src/main/assets/index.html

          python3 - << 'PYEOF'
          import struct, zlib
          def chunk(t,d):
            c=t+d; return struct.pack('>I',len(d))+c+struct.pack('>I',zlib.crc32(c)&0xffffffff)
          def icon(sz):
            cx=cy=sz/2; r=sz/2-2; rows=[]
            for y in range(sz):
              row=b'\x00'
              for x in range(sz):
                dx,dy=x-cx,y-cy; d=(dx*dx+dy*dy)**0.5
                if d>r: row+=b'\x00\x00\x00\x00'
                elif d>r-2: row+=bytes([20,20,20,255])
                elif y<cy-3: row+=bytes([255,215,0,255])
                elif y>cy+3: row+=bytes([240,240,240,255])
                else: row+=bytes([20,20,20,255])
              rows.append(row)
            raw=b''.join(rows)
            png=b'\x89PNG\r\n\x1a\n'
            png+=chunk(b'IHDR',struct.pack('>IIBBBBB',sz,sz,8,6,0,0,0))
            png+=chunk(b'IDAT',zlib.compress(raw,9))
            png+=chunk(b'IEND',b'')
            return png
          for d,s in [('mdpi',48),('hdpi',72),('xhdpi',96),('xxhdpi',144),('xxxhdpi',192)]:
            open(f'android/app/src/main/res/mipmap-{d}/ic_launcher.png','wb').write(icon(s))
          print("Icons generated.")
          PYEOF

          cat > android/app/src/main/res/values/strings.xml << 'RES'
          <?xml version="1.0" encoding="utf-8"?>
          <resources><string name="app_name">PokéCards!</string></resources>
          RES

          cat > android/app/src/main/res/values/colors.xml << 'RES'
          <?xml version="1.0" encoding="utf-8"?>
          <resources><color name="bg">#0f0c29</color></resources>
          RES

          cat > android/app/src/main/res/values/styles.xml << 'RES'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <style name="AppTheme" parent="android:Theme.Material.NoActionBar">
              <item name="android:windowBackground">@color/bg</item>
              <item name="android:statusBarColor">@color/bg</item>
              <item name="android:navigationBarColor">@color/bg</item>
            </style>
          </resources>
          RES

          cat > android/app/src/main/AndroidManifest.xml << MANIFEST
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="${PKG}">
            <uses-permission android:name="android.permission.INTERNET"/>
            <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>
            <application android:allowBackup="true" android:icon="@mipmap/ic_launcher"
                android:label="@string/app_name" android:theme="@style/AppTheme"
                android:usesCleartextTraffic="false">
              <activity android:name=".MainActivity" android:exported="true"
                  android:configChanges="orientation|screenSize|keyboardHidden"
                  android:windowSoftInputMode="adjustResize">
                <intent-filter>
                  <action android:name="android.intent.action.MAIN"/>
                  <category android:name="android.intent.category.LAUNCHER"/>
                </intent-filter>
              </activity>
            </application>
          </manifest>
          MANIFEST

          cat > android/app/src/main/java/com/dcheshirecat/pokecards/MainActivity.java << 'JAVA'
          package com.dcheshirecat.pokecards;
          import android.app.Activity;
          import android.content.SharedPreferences;
          import android.os.Bundle;
          import android.webkit.*;
          import android.view.View;
          import android.view.Window;
          import android.view.WindowManager;

          public class MainActivity extends Activity {
              private WebView webView;
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  requestWindowFeature(Window.FEATURE_NO_TITLE);
                  getWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN,
                      WindowManager.LayoutParams.FLAG_FULLSCREEN);
                  webView = new WebView(this);
                  setContentView(webView);
                  WebSettings ws = webView.getSettings();
                  ws.setJavaScriptEnabled(true);
                  ws.setDomStorageEnabled(true);
                  ws.setAllowFileAccess(true);
                  ws.setAllowContentAccess(true);
                  ws.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);
                  ws.setCacheMode(WebSettings.LOAD_DEFAULT);
                  webView.addJavascriptInterface(new StorageBridge(this), "AndroidStorage");
                  webView.setWebViewClient(new WebViewClient(){
                      @Override public boolean shouldOverrideUrlLoading(WebView v,String u){return false;}
                  });
                  webView.setScrollBarStyle(View.SCROLLBARS_INSIDE_OVERLAY);
                  webView.loadUrl("file:///android_asset/index.html");
              }
              @Override public void onBackPressed(){if(webView.canGoBack())webView.goBack();else super.onBackPressed();}

              public static class StorageBridge {
                  private final SharedPreferences prefs;
                  StorageBridge(Activity a){prefs=a.getSharedPreferences("pokecards_store",Activity.MODE_PRIVATE);}
                  @JavascriptInterface public String get(String k){return prefs.getString(k,null);}
                  @JavascriptInterface public void set(String k,String v){prefs.edit().putString(k,v).apply();}
                  @JavascriptInterface public void remove(String k){prefs.edit().remove(k).apply();}
              }
          }
          JAVA

          cat > android/app/build.gradle << GRADLE
          plugins { id 'com.android.application' }
          android {
              namespace '${PKG}'
              compileSdk 34
              defaultConfig {
                  applicationId '${PKG}'
                  minSdk 26; targetSdk 34
                  versionCode 4; versionName '4.0.0'
              }
              signingConfigs { release {
                  storeFile file('keystore.jks')
                  storePassword 'pokecards123'; keyAlias 'pokecards'; keyPassword 'pokecards123'
              }}
              buildTypes { release { signingConfig signingConfigs.release; minifyEnabled false } }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          GRADLE

          cat > android/settings.gradle << 'SGRAD'
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "PokéCards"
          include ':app'
          SGRAD

          cat > android/build.gradle << 'BGRAD'
          plugins { id 'com.android.application' version '8.2.0' apply false }
          BGRAD

          cat > android/gradle/wrapper/gradle-wrapper.properties << 'GWPROP'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          GWPROP

          printf '#!/bin/sh\nexec gradle "$@"\n' > android/gradlew && chmod +x android/gradlew
          echo "✅ Project scaffolded."

      - name: Generate keystore
        run: |
          keytool -genkey -v -keystore android/app/keystore.jks \
            -alias pokecards -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass pokecards123 -keypass pokecards123 \
            -dname "CN=PokéCards,O=dcheshirecat,C=US" -noprompt

      - name: Download Gradle & build APK
        working-directory: android
        run: |
          VER=8.4; ZIP="gradle-${VER}-bin.zip"; DIR="$HOME/.gradle_bin/gradle-${VER}"
          if [ ! -f "$DIR/bin/gradle" ]; then
            mkdir -p "$HOME/.gradle_bin"
            curl -fsSL -o "/tmp/${ZIP}" "https://services.gradle.org/distributions/${ZIP}"
            unzip -q "/tmp/${ZIP}" -d "$HOME/.gradle_bin"
          fi
          export PATH="$DIR/bin:$PATH"
          gradle assembleRelease --no-daemon --stacktrace -Dorg.gradle.jvmargs="-Xmx2g"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pokecards-v4-release
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Build summary
        run: |
          APK="android/app/build/outputs/apk/release/app-release.apk"
          if [ -f "$APK" ]; then
            echo "## ✅ PokéCards v4 APK Built!" >> $GITHUB_STEP_SUMMARY
            echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Size | $(du -sh "$APK"|cut -f1) |" >> $GITHUB_STEP_SUMMARY
            echo "| Package | com.dcheshirecat.pokecards |" >> $GITHUB_STEP_SUMMARY
            echo "| Version | 4.0.0 |" >> $GITHUB_STEP_SUMMARY
            echo "| Min SDK | 26 (Android 8.0+) |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Download from **Artifacts** above ☝️" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ Build failed" >> $GITHUB_STEP_SUMMARY; exit 1
          fi
