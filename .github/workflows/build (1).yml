name: Build Pokémon TCG APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build signed Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Prepare Capacitor project
        run: |
          set -e
          mkdir -p apk-build/www
          # Source the standalone game from public/game.html
          cp public/game.html apk-build/www/index.html

          cd apk-build
          npm init -y
          npm install --no-audit --no-fund \
            @capacitor/core @capacitor/cli @capacitor/android

          # Capacitor config
          cat > capacitor.config.json <<'EOF'
          {
            "appId": "com.lovable.pokemontcg",
            "appName": "Pokemon TCG",
            "webDir": "www",
            "bundledWebRuntime": false
          }
          EOF

          npx cap add android
          npx cap copy android

      - name: Generate single-use keystore
        id: keystore
        run: |
          set -e
          KS_PASS=$(openssl rand -hex 16)
          KEY_PASS=$(openssl rand -hex 16)
          KS_PATH="${{ github.workspace }}/apk-build/release.keystore"
          keytool -genkey -v \
            -keystore "$KS_PATH" \
            -alias release \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "$KS_PASS" -keypass "$KEY_PASS" \
            -dname "CN=Pokemon TCG, OU=Lovable, O=Lovable, L=NA, S=NA, C=US"
          echo "ks_path=$KS_PATH" >> "$GITHUB_OUTPUT"
          echo "::add-mask::$KS_PASS"
          echo "::add-mask::$KEY_PASS"
          echo "ks_pass=$KS_PASS" >> "$GITHUB_OUTPUT"
          echo "key_pass=$KEY_PASS" >> "$GITHUB_OUTPUT"

      - name: Build release APK (unsigned)
        working-directory: apk-build/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Sign APK with apksigner
        run: |
          set -e
          UNSIGNED=$(find apk-build/android/app/build/outputs/apk/release -name "*-unsigned.apk" | head -1)
          if [ -z "$UNSIGNED" ]; then
            UNSIGNED=$(find apk-build/android/app/build/outputs/apk/release -name "*.apk" | head -1)
          fi
          echo "Unsigned APK: $UNSIGNED"

          BT=$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -1)
          ALIGNED="apk-build/android/app/build/outputs/apk/release/app-release-aligned.apk"
          SIGNED="apk-build/pokemon-tcg.apk"

          "$ANDROID_HOME/build-tools/$BT/zipalign" -v -p 4 "$UNSIGNED" "$ALIGNED"
          "$ANDROID_HOME/build-tools/$BT/apksigner" sign \
            --ks "${{ steps.keystore.outputs.ks_path }}" \
            --ks-key-alias release \
            --ks-pass "pass:${{ steps.keystore.outputs.ks_pass }}" \
            --key-pass "pass:${{ steps.keystore.outputs.key_pass }}" \
            --out "$SIGNED" "$ALIGNED"
          "$ANDROID_HOME/build-tools/$BT/apksigner" verify --verbose "$SIGNED"

      - name: Cleanup keystore
        if: always()
        run: rm -f apk-build/release.keystore

      - name: Upload signed APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pokemon-tcg-apk
          path: apk-build/pokemon-tcg.apk
          if-no-files-found: error
          retention-days: 30
