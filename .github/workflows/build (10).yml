name: Build Pokémon TCG APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build signed Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Prepare Capacitor project
        run: |
          set -e
          mkdir -p apk-build/www
          # Source the standalone game — prefer root game.html, then public/game.html
          if [ -f game.html ]; then
            cp game.html apk-build/www/index.html
          elif [ -f public/game.html ]; then
            cp public/game.html apk-build/www/index.html
          else
            echo "ERROR: No game.html or public/game.html found in repo."
            exit 1
          fi

          cd apk-build
          npm init -y
          npm install --save-exact --no-audit --no-fund \
            @capacitor/core@6.2.1 @capacitor/cli@6.2.1 @capacitor/android@6.2.1

          node -e "['@capacitor/core','@capacitor/cli','@capacitor/android'].forEach((pkg) => console.log(pkg, require('./node_modules/' + pkg + '/package.json').version))"

          # Capacitor config
          cat > capacitor.config.json <<'EOF'
          {
            "appId": "com.lovable.pokemontcg",
            "appName": "Pokemon TCG",
            "webDir": "www",
            "bundledWebRuntime": false
          }
          EOF

          npx cap add android
          npx cap copy android

      - name: Generate single-use keystore
        run: |
          set -e
          KS_PASS=$(openssl rand -hex 24)
          KS_PATH="${GITHUB_WORKSPACE}/apk-build/release.keystore"
          echo "::add-mask::$KS_PASS"
          # Use the same password for keystore and key to avoid PKCS12 key/store password mismatch issues.
          keytool -genkeypair -v \
            -keystore "$KS_PATH" \
            -storetype PKCS12 \
            -alias release \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "$KS_PASS" -keypass "$KS_PASS" \
            -dname "CN=Pokemon TCG, OU=Lovable, O=Lovable, L=NA, S=NA, C=US"
          # Export as env so subsequent steps don't go through ${{ }} shell interpolation.
          {
            echo "KS_PATH=$KS_PATH"
            echo "KS_PASS=$KS_PASS"
          } >> "$GITHUB_ENV"

      - name: Build release APK (unsigned)
        working-directory: apk-build/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Sign APK with apksigner
        run: |
          set -e
          UNSIGNED=$(find apk-build/android/app/build/outputs/apk/release -name "*-unsigned.apk" | head -1)
          if [ -z "$UNSIGNED" ]; then
            UNSIGNED=$(find apk-build/android/app/build/outputs/apk/release -name "*.apk" | head -1)
          fi
          echo "Unsigned APK: $UNSIGNED"

          BT=$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -1)
          ALIGNED="apk-build/android/app/build/outputs/apk/release/app-release-aligned.apk"
          SIGNED="apk-build/pokemon-tcg.apk"

          "$ANDROID_HOME/build-tools/$BT/zipalign" -v -p 4 "$UNSIGNED" "$ALIGNED"
          "$ANDROID_HOME/build-tools/$BT/apksigner" sign \
            --ks "$KS_PATH" \
            --ks-key-alias release \
            --ks-pass "env:KS_PASS" \
            --key-pass "env:KS_PASS" \
            --out "$SIGNED" "$ALIGNED"
          "$ANDROID_HOME/build-tools/$BT/apksigner" verify --verbose "$SIGNED"

      - name: Cleanup keystore
        if: always()
        run: rm -f apk-build/release.keystore

      - name: Upload signed APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pokemon-tcg-apk
          path: apk-build/pokemon-tcg.apk
          if-no-files-found: error
          retention-days: 30
